locales.info = Тук можете да добавите пакети с локализация за определен език към картата. В тези пакети, всяко свойство има стойност. Тези свойства могат да бъдат използвани от процесори на света и задачи използвайки техните имена. Поддържат форматиране на текст (заменяйки примерите с истински стойности).\n\n[cyan]Примерно свойство:\n[]име: [accent]таймер[]\nстойност: [accent]Останало време на примерния таймер: {0}[]\n\n[cyan]Използване:\n[]Поставете го като текст на задачата: [accent]@timer\n\n[]Изведете го в процесор на света:\n[accent]localeprint "таймер"\nформатирайте времето\n[gray](където времето е отделно смятана променлива)
