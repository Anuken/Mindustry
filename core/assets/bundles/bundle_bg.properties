host.info = Бутонът [accent]Отвори за локалната мрежа[] стартира сървър на порт [scarlet]6567[].\nВсеки в същата [lightgray]локална мрежа или WiFi[] би трябвало да види сървъра в списъка със сървъри.\n\nЗа да могат хора извън локалната мрежата да се свържат по IP е необходимо [accent]пренасочване на портове (port forwarding)[].\n\n[lightgray]Бележка: Ако някой има проблеми при свързване към вашата локална (LAN) игра, проверете дали сте позволили достъп на Mindustry до локалната мрежа в настройките на защитната стена (firewall). Някои публични мрежи не позволяват сървърите в тях да бъдат автоматично открити от останалите играчи.
join.info = Тук можете да въведете [accent]IP адрес на сървър[] за да се свържете или да се присъедините към автоматично намерен сървър във вашата [accent]локална мрежа[] или [accent]публичен[] сървър.\nПоддържат се LAN и WAN мрежови игри.\n\n[lightgray]Ако искате да се свържете по IP ще трябва първо да поискате IP на собственика на сървъра, което той може да намери като напише "my ip" в Google от своята мрежа.
