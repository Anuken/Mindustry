sector.groundZero.description = Перфектното място за започване отначало. Ниска заплаха. Малко ресурси.\nСъберете колкото се може повече мед и олово.\nПродължете напред.
sector.frozenForest.description = Дори тук, близо до планините, спорите са се разпространили. Мразовитите температури не могат да ги задържат вечно.\n\nОвладейте електричеството. Постройте горивни генератори. Научете се да ползвате възстановители.
sector.saltFlats.description = На покрайнините на пустинята лежат Солените равнини. Няма много ресурси на това място.\n\nВрагът е издигнал комплекс за съхранение на ресурси тук. Изкоренете ядрото му. Сравнете всичко със земята.
sector.crateredBattleground.description = Water has accumulated in this crater, relic of the old wars. Reclaim the area. Collect sand. Smelt metaglass. Pump water to cool turrets and drills.
sector.ruinousShores.description = Сред отпадъците е и бреговата линия. Някога тук е стояла бреговата защитна линия. Няма много следи от нея. Останали са само някои елементарни защитни механизми, всичко останало е сведено до скрап.\nПродължете разширяването навън. Преоткрийте технологията.
sector.stainedMountains.description = По-навътре в коонтинента се намират планините, все още незамърсени от спорите.\nИзвлечете изоставеният титан в тази зона. Научете се да го използвате.\n\nПрисъствието на врагове тук е по-високо. Не им оставяйте време да изпратят тежката артилерия.
sector.overgrowth.description = Обладана от висока растителност, тази зона се намира изключително близо до източника на спорите. Врагът е установил военен лагер тук. Постройте единици модел 'Боздуган' и унищожете вражеската база.
sector.tarFields.description = Покрайнините на нефтено находище, намиращо се между планините и пустинята. Една от малкото зони с използваеми резерви на нефт.\nМакар и изоставена, близо до тази зона има опасни вражески сили. Не ги подценявайте.\n\n[lightgray]Препоръчително е да проучите технология за обработка на нефт преди да започнете.
sector.desolateRift.description = Много опасна зона. Изобилие на ресурси, но малко пространство. Висок риск от унищожение. Напуснете възможно най-скоро. Не се подлъгвайте от дългите интервали между атаките.
sector.nuclearComplex.description = Бивш комплекс за добив и обработка на торий, от който са останали само руини.\n[lightgray]Проучете тория и многобройните му приложения.\n\nВражеското присъствие тук е многобройно и непрекъснато внимава за неприятели.
sector.fungalPass.description = Преходна зона между високи планини и по-ниски, осеяни със спори, земи. Тук врагът е разположил малка разузнавателна база.\nУнищожете я.\nИзползвайте единици модел 'Кинжал' и 'Къртица'. Унищожете двете вражески ядра.
sector.biomassFacility.description = Това съоръжение е първоизточникът на спорите. Тук те са били проучвани и създадени за първи път.\nПроучете технологиите скрити в него. Култивирайте спори, за да произвеждате гориво и пластмаса.\n\n[lightgray]След смъртта на съоръжението спорите били освободени. Нищо в местната екосистема не може да съперничи на такъв инвазивен организъм.
sector.windsweptIslands.description = По-нататък край бреговата линия се намира тази отдалечена верига от острови. Според някои записи, тук някога е имало структури за производство на [accent]Пластаний[].\n\nОтблъснете вражеските морски войски. Подсигурете своя база на тези острови. Проучете тези фабрики.
sector.extractionOutpost.description = Отдалечен аванпост, където врагът е изследвал технологии за пренасяне на ресурси на далечни растояния.\n\nТехнологията за транспорт на материали между зоните е ключова за бъдещи действия. Унищожете вражеската база и проучете вражеските Изстрелващи площадки.
sector.impact0078.description = Тук лежат останките от първия навлязал междузвезден транспортер в тази система.\n\nСпасете колкото е възможно повече. Проучете всяка непокътната технология.
sector.planetaryTerminal.description = Крайна цел.\n\nТази крайбрежна база съдържа структура, създадена с цел междупланетарен транспорт на ядра, макар и само в рамките на локалната звездна система. Тази локация има изключително висока защита.\n\nИзползвайте морски единици. Елиминирайте врага възможно най-бързо. Проучете изстрелващата структура.
sector.coastline.description = На това място са засечени останките от технология за производството на морски единици. Отблъснете вражеските атаки, завладейте този сектор и присвоете технологията.
sector.navalFortress.description = Врагът е установил база на отдалечен, естествено укрепен остров. Унищожете базите им. Придобийте напредналата им морска технология и я проучете.
sector.facility32m.description = Този сектор съдържа рушащи се останки от съоръжение за производство на взривни съединения.\n\nПревземете тази зона. Проучете миксера за взривно съединение. Произведете взривно съединение и го използвайте като боеприпаси за оръдията ви.
sector.taintedWoods.description = [gray][опционална цел][]\nБогат на нефтени находища, този сектор съдържа големи маси от спорови растения, правейки го труден за овладяване.\n\nИзползвайте неговите ресурси, за да произведете пластаний. Защитете се от врага.
sector.sunkenPier.description = [gray][опционална цел][]\nНякога блило офшорно, това съоръжение отдавна се е превърнало в развалини.\n\nВисоки количества вражески морски единици бяха засечени. Бъдете приготвени за атаки от няколко посоки.
sector.atolls.description = [gray][опционална цел][]\nНяколко вражески морски бази бяха засечени на този сектор.\n\nИзползвайте единици Мега за да пренесете наземни единици на местата за атакуване. Постройте морски единици, за да унищожите пречещите авантостове.
sector.frontier.description = Малък вражески аванпост беше открит тук.\n\nПостройте единици Моно за да добивате ресурси по ефективно. Използвайте добавящ реконструктор за да направите подобрени единици.
sector.infestedCanyons.description = Отвъд планините се простира криволичеща речна долина, сега покрита със слоеве споров мъх.\n\nУдържайте позициите си срещу вражеската атака. Постройте морски единици. Елиминирайте всичките вражески ядра.
sector.testingGrounds.description = [gray][опционална цел][]\nПустинна равнина покрита с кратери, преди използван като изпитателен полигон за военни проекти.\n\nПоради отсъствието на вода, установяването на присъствие на това място може да представлява предизвикателство. Бъдете приготвени за атаки от няколко посоки.
sector.perilousHarbor.description = Няколко вражески бази са установени по този опасен прибрежен регион.\n\nКонструирайте морски единици, и изравнете техните укрепления със земята.
sector.weatheredChannels.description = [gray][опционална цел][]\nТази канална система крие изобилие от ресурси. Приземете ядрото ви. Защититете се от множеството вълни и ги вземете.\n\nВрагът ще премине по няколко пъте за да превземе вашата инфраструктура. Търсете признаци на възможна засада и се защитавайте съответно.
sector.mycelialBastion.description = Този укрепен комплекс се намира дълбоко в споровите региони, застрашавайки съседните сектори с подобрени насекомоподобни единици.\n\nПревземете комплекса. Вземете технологията оттам. Използвайте единици способни да прекосяват стени.
sector.littoralShipyard.description = Раазположено в отдалечените краища на централното море, това морско съоръжение съдържа технологии за строенето на подобрени единици.\n\nОнищожете съоръжението, и използвайте неговите технологии за последваща помощ за изпълнение на финалната цел.

