locales.info = Zde můžete do mapy přidat balíčky národního prostředí pro konkrétní jazyky. V balíčcích národního prostředí má každá vlastnost název a hodnotu. Tyto vlastnosti mohou využívat světoví zpracovatelé a cíle pomocí svých jmen. Podporují formátování textu (nahrazení zástupných symbolů skutečnými hodnotami).\n\n[cyan]Příklad vlastnosti:\n[]název: [accent]timer[]\nvalue: [accent]Příklad časovače, zbývající čas: {0}[]\n\n[cyan]Usage:\n[]Nastavte jej jako text cíle: [accent]@timer\n\n[]Vytiskněte si to ve světovém procesoru:\n[accent]localeprint "timer"\nformat time\n[gray](kde čas je samostatně vypočítaná proměnná)
