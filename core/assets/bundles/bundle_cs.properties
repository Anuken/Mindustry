lglobal.@clientMobile = Pravda, pokud klient spouštějící kód běží na mobilu; jinak nepravda

lenum.type = Typ budovy/jednotky.\nnapř. pro jakýkoliv směrovač, toto vrátí [accent]@router[].\nNikoliv textovou hodnotu.
lenum.shoot = Vystřelí na určitou pozici.
lenum.shootp = Vystřelí na jednotku/budovu s rychlostní předpovědí.
lenum.config = Konfigurace budovy, např. třídící věc pro třídičku.
lenum.enabled = Zda je blok povolen.

laccess.currentammotype = Aktuální předmět/tekutina munice věže.
laccess.memorycapacity = Počet buněk v paměťovém bloku.
laccess.color = Barva osvětlovače.
laccess.controller = Kontroler jednotky. Pokud procesor je kontrolován, vrátí procesor\nPokud je ve formaci, vrací vůdce.\nJinak vrací jednotku.
laccess.dead = Zda jednotka/budova je mrtvá/zničená nebo již neplatná.
laccess.controlled = Vrací:\n[accent]@ctrlProcessor[] pokud je ovladačem jednotky procesor\n[accent]@ctrlPlayer[] pokud je ovladačem jednotky/budovy hráč\n[accent]@ctrlFormation[] pokud je jednotka ve formaci\nJinak 0.
laccess.progress = Průběh akce, 0 do 1.\nVrací průběh výroby, přebití věže nebo stavby.
laccess.speed = Nejvyšší rychlost jednotky v dlaždicích/sek.
laccess.size = Velikost jednotky/budovy nebo délka řetězce.
laccess.id = ID jednotky/bloku/předmětu/tekutiny.\nJe to opak operace lookup.
laccess.displaywidth = Šířka displeje v pixelech.
laccess.displayheight = Výška displeje v pixelech.
laccess.buffersize = Počet nezpracovaných příkazů ve vyrovnávací paměti displeje.
laccess.operations = Počet operací provedených na bloku.\nU displejů vrací počet operací drawflush.
laccess.maxunits = Maximální počet jednotek, které tým může mít.\nLze snímat pouze z jader.

