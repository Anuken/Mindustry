sector.groundZero.description = Optimální místo, kde znovu začít. Nízký výskyt nepřátel. Několik málo surovin.\nPosbírej co nejvíce olova a mědi.\nBěž dál.
sector.frozenForest.description = Dokonce až sem, blízko hor, se dokázaly spóry rozrůst. Mráz je však nemůže zadržet navěky.\n\nPusť se do práce za pomocí energie. Stav spalovací generátory. Nauč se, jak používat opravovací věže.
sector.saltFlats.description = Na okraji pouště leží Solné nížiny. V této lokaci se nachází jen několik málo surovin.\n\nNepřítel zde vybudoval zásobovací komplex. Znič jádro v jeho základně. Nenechej kámen na kameni.
sector.crateredBattleground.description = V tomto kráteru, pozůstatku starých válek, se nahromadila voda. Získej oblast zpět. Nasbírej písek. Tav metasklo. Čerpej vodu pro chlazení věží a vrtáků.
sector.ruinousShores.description = Za pustinou se nachází pobřeží. Kdysi zde stál obranný pobřežní systém. Moc z něj už dneska nezbylo. Jen základní konstrukce zůstaly ušetřeny, zbytek se rozpadl na šrot.\nPokračuj ve své expanzi hlouběji. Objev ztracenou technologii.
sector.stainedMountains.description = Dále ve vnitrozemí leží hory, dosud neposkvrněny spórami.\nVytěž titan, kterým tato oblast oplývá. Nauč se jej používat.\n\nPřítomnost nepřátelských jednotek je zde větší. Radši jim nedej moc času na vyslání jejich nejsilnějších jednotech.
sector.overgrowth.description = Tato přerostlá džungle se nachází blíže ke zdroji spór.\nNepřítel zde zbudoval předsunutou hlídku. Stav jednotky Palcát a znič s jejich pomocí jádro základny.
sector.tarFields.description = Rozhraní produkční naftové oblasti mezi horami a pouští. Jedna z mála oblastí, kde se stále nachází dehet.\nAčkoliv je oblast opuštěná, stále se v jejím okolí nachází nebezpečné nepřátelské síly. Není radno je podcenit.\n\n[lightgray]Vyzkoumej technologii na zpracování nafty.[]
sector.desolateRift.description = Extrémně nebezpečná mapa. Na úkor prostoru se zde nachází přehršel surovin. Vysoká pravděpodobnost zničení. Postav vzdušnou a pozemní obranu co nejdříve to půjde. Nenech se zmást dlouhými prodlevami mezi vlnami nepřátel.
sector.nuclearComplex.description = Bývalá továrna na zpracování thoria, dnes v troskách.\n[lightgray]Objev thorium a jeho široké využití.[]\n\nNepřátelské jednotky se zde nacházejí v hojném počtu, a neustále prohledávají oblast.
sector.fungalPass.description = Přechodová oblast mezi vysokými horami a spórami nasycenou zemí. Nachází se zde malá průzkumná základna Tvého nepřítele.\nZnič ji.\nPoužij mechy Dýka a Slídil. Znič obě nepřátelské jádra.
sector.biomassFacility.description = Prapůvod všech spór. Toto je zařízení, ve kterém byly spóry vynalezeny a zpočátku i vyráběny.\nVynalezni technologii, která se skrývá uvnitř. Kultivuj spóry k výrobě paliva a plastů.\n\n[lightgray]Po vypnutí tohoto zařízení byly spóry vypuštěny. V okolním ekosystému však tomuto invazivnímu druhu nebylo nic schopné konkurovat.
sector.windsweptIslands.description = Vzdálen od pevniny je tento řetízek ostrovů. Záznamy ukazují, že zde kdysi byly zařízení na výrobu [accent]Plastanů[].\n\nPoraž nepřátelské námořní jednotky. Vybuduj základnu na ostrově. Vynalezni továrny.
sector.extractionOutpost.description = Vzdálená pevnost, postavená nepřítelem za účelem vysílání zdrojů do okolních sektorů.\n\nDoprava položek napříč sektory je nezbytná pro lapení dalších sektorů. Znič základnu. Vyzkoumej jejich Vysílací plošiny.
sector.impact0078.description = Zde leží zbytky mezihvězdné lodi, která vstoupila do tohoto systému.\n\nZachraň z vraku vše, co se dá. Vyzkoumej nepoškozenou technologii.
sector.planetaryTerminal.description = Konečný cíl.\n\nTato pobřežní základna obsahuje konstrukce schopné vyslat jádra na okolní planety. Je mimořádně dobře opevněna.\n\nVyrob námořní jednotky. Odstraň nepřítele tak rychle, jak umíš. Vyzkoumej vysílací konstrukci.
sector.coastline.description = V této lokaci byly objeveny pozůstatky techniky námořních jednotek. Odraz nepřátelské útoky, dobyj tento sektor a získej technologii.
sector.navalFortress.description = Nepřítel si vybudoval základnu na odlehlém, přírodou opevněném ostrově. Zničte tuto základnu. Získejte jejich pokročilou technologii námořních plavidel a vyzkoumejte ji.
sector.facility32m.description = Tento sektor obsahuje tlející zbytky zařízení na výrobu výbušnin.\n\nDobuď tuto oblast. Vyzkoumej trhací mísič. Vyráběj trhavou směs pro použití jako munici do věží.
sector.taintedWoods.description = [gray][volitelný cíl][]\nTento sektor je bohatý na zásoby ropy a obsahuje rozsáhlé porosty hub, kvůli kterým je obtížné jím procházet.\n\nVyužij jeho zdroje k výrobě plastanu. Odraž nepřítele.
sector.sunkenPier.description = [gray][volitelný cíl][]\nToto zařízení, kdysi pobřežní ropná plošina, už dávno zpustlo.\n\nBylo zjištěno velké množství nepřátelských námořních jednotek. Připrav se na útoky z více směrů.
sector.atolls.description = [gray][volitelný cíl][]\nV této oblasti bylo zjištěno několik nepřátelských námořních základen.\n\nVyužij nákladní jednotky Mega k přepravě pozemních sil do útočných pozic. Stav námořní jednotky a znič okrajové základny.
sector.frontier.description = Zde byla zjištěna malá nepřátelská základna.\n\nStav jednotky Mono pro efektivnější sběr zdrojů. Použij přídavný přestavovač k vytvoření silnějších jednotek.
sector.infestedCanyons.description = Za horami leží klikaté říční údolí, nyní pokryté vrstvami spórového mechu.\n\nUdrž pozici proti nepřátelskému náporu. Stav námořní jednotky. Zlikviduj všechna nepřátelská jádra.
sector.testingGrounds.description = [gray][volitelný cíl][]\nPouštní údolí poseté krátery, dříve používané jako testovací oblast pro vojenské projekty.\n\nKvůli nedostatku vody zde může být vybudování přítomnosti obtížné. Připrav se na útoky z více směrů.
sector.perilousHarbor.description = V této zrádné pobřežní oblasti vzniklo několik nepřátelských základen.\n\nStav námořní jednotky a rozdrť jejich opevnění.
sector.weatheredChannels.description = [gray][volitelný cíl][]\nTento systém průlivů skrývá hojné zdroje. Přistaň se svým jádrem. Odraž nepřátelské vlny a získej je.\n\nNepřítel zaútočí na tvou infrastrukturu několika trasami. Hledej známky možné léčky a podle toho se braň.
sector.mycelialBastion.description = Tento opevněný komplex leží hluboko v houbových oblastech a ohrožuje sousední sektory pokročilými hmyzoidními jednotkami.\n\nZaútoč na komplex. Získej technologii uvnitř. Využij jednotky schopné překonávat zdi.
sector.littoralShipyard.description = Toto námořní výrobní zařízení, nacházející se na vzdáleném okraji centrálního moře, obsahuje technologii pro stavbu pokročilých jednotek.\n\nZnič toto zařízení a využij jeho technologii jako další pomoc při splnění konečného cíle.

