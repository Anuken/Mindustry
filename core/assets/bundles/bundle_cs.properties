hint.skip = Přeskočit
hint.desktopMove = Použij [accent][[WASD][] k pohybu.
hint.zoom = [accent]Roluj[] prp přiblížení a oddalování obrazvky.
hint.desktopShoot = Klikni na [accent][[levé tlačítko][] myši pro střelbu.
hint.depositItems = Pro přesun položek je přetáhni ze své lodi do jádra.
hint.respawn = Aby ses znovu přepnul na loď, zmáčkni [accent][[V][].
hint.respawn.mobile = Přepnul ses na ovládání jednotky nebo konstrukce. Aby ses přepnul zpět na loď, klikni na avatara vlevo nahoře.
hint.desktopPause = Zmáčkni [accent][[mezerník][] k pozastavení a zase spuštění hry.
hint.breaking = Klikni [accent]pravým tlačítkem[] a potáhni pro rozbití bloků.
hint.breaking.mobile = Použij \ue817 [accent]kladivo[] v pravém spodním rohu a pak ťupni pro rozbití bloků.\n\nPodrž chvíli prst a táhni pro rozbití bloků ve výběru.
hint.blockInfo = Pro zobrazení informací o bloku, vyberte blok ve [accent]stavebním menu[], poté kliknutím na [accent][[?][] tlačítka vpravo.
hint.derelict = [accent]Opuštěné[] struktury jsou rozbíté pozůstalky starých základen, které již nefungujou.\n\nTyto struktury můžou být [accent]rozebraný[] pro získaní zdrojů.
hint.research = Použij tlačítko \ue875 [accent]Výzkum[] pro vyzkoumání nové technologie.
hint.research.mobile = Použij tlačítko \ue875 [accent]Výzkum[] v \ue88c [accent]nabídce[] pro vyzkoumání nové technologie.
hint.unitControl = Podrž [accent][[Levý Ctrl][] a [accent]klikni[] pro ovládání spřátelených jednotek nebo věží.
hint.unitControl.mobile = [accent][[Dvojťupni][] pro ovládání spřátelených jednotek nebo věží.
hint.unitSelectControl = Chceš-li ovládat jednotky, vstup do [accent]příkazového režimu[] podržením [accent]levého Shiftu[].\nV příkazovém režimu vyber jednotky kliknutím a tažením. [accent]Kliknutím pravým tlačítkem[] na místo nebo cíl jim vydáš příkaz.
hint.unitSelectControl.mobile = Chceš-li ovládat jednotky, vstup do [accent]příkazového režimu[] stisknutím [accent]příkazového tlačítka[] vlevo dole.\nV příkazovém režimu vyber jednotky dlouhým stisknutím a tažením. Klepnutím na místo nebo cíl jim vydáš příkaz.
hint.launch = Jakmile je nasbíráno dostatek zdrojových materiálů, můžeš se [accent]vyslat[] do přilehlých sektorů z \ue827 [accent]mapy[] v pravém dolním rohu.
hint.launch.mobile = Jakmile je nasbíráno dostatek zdrojových materiálů, můžeš se [accent]vyslat[] do přilehlých sektorů z \ue827 [accent]mapy[] v the \ue88c [accent]nabídce[].
hint.schematicSelect = Podrž [accent][[F][] a potáhni pro výběr bloků, které chceš zkopírovat.\n\nKlikni na [accent][[prostřední tlačítko][] myši pro zkopírování jednoho typu bloku.
hint.rebuildSelect = Podrž [accent][[B][] a tažením vyber plány zničených bloků.\nTím se automaticky přestaví.
hint.rebuildSelect.mobile = Vyber tlačítko :copy: kopírování, potom klepni na tlačítko :wrench: přestavby a tažením vyber plány zničených bloků.\nTím se automaticky přestaví.
hint.conveyorPathfind = Podrž [accent][[levý Ctrl][], když táhneš dopravníky, pro automatické vygenerování cesty.
hint.conveyorPathfind.mobile = Povol \ue844 [accent]úhlopříčný režim[] a potáhni dopravníky pro automatické generování cesty.
hint.boost = Podrž [accent][[levý Shift][], abys přeletěl přes překážky se svou současnou jednotkou.\n\nPouze některé jednotky však mají takový posilovač.
hint.payloadPickup = Zmáčkni [accent][[[] pro sebrání malých bloků nebo jednotek.
hint.payloadPickup.mobile = [accent]Ťupni a podrž[] na malém bloku nebo jednotce pro sebrání.
hint.payloadDrop = Zmáčkni [accent]][] pro položení nákladu.
hint.payloadDrop.mobile = [accent]Ťupni a drž[] na prázdném místě pro položení nákladu.
hint.waveFire = [accent]Naplň[] věže vodou místo munice pro automatické hašení okolních požárů.
hint.guardian = Jednotky [accent]Strážce[] jsou obrněné. Měkká munice, jako je například [accent]měď[] a [accent]olovo[] je [scarlet]neefektivní[].\n\nPoužij vylepšené věže nebo \uf835 [accent]grafitovou[] munici pro \uf861 Střílnu Duo/\uf859 Salvu, abys Strážce sejmul.
hint.coreUpgrade = Jádro může být vylepšeno [accent]překrytím jádrem vyšší úrovně[].\n\nUmísti jádro typu [accent]Základ[] přes jádro typu [accent]Odštěpek[]. Ujisti se, že v okolí nejsou žádné překážky.
hint.serpuloCoreZone = Další :core-shard: [accent]jádra[] lze stavět na dlaždicích :core-zone: [accent]zóny jádra[].
hint.cannotUpgrade = Ikona [red]:tree:[] nad nákladní jednotkou znamená, že její vylepšená verze ještě není vyzkoumána.\n\nVylepšení jednotek musí být vyzkoumána ve [accent]:tree: stromu technologií[], než je bude možné vyrábět v přestavovačích.
hint.presetLaunch = Na šedé [accent]sektory v přistávací zóně[], jako je například [accent]Zamrzlý les[], se lze vyslat kdykoli. Nevyžadují polapení okolního teritoria.\n\n[accent]Číslované sektory[], jako je tento, jsou [accent]volitelné[].
hint.presetDifficulty = Tento sektor má [scarlet]vysokou úroveň nepřátelského ohrožení[].\nVyslání do takových sektorů se [accent]nedoporučuje[] bez náležité technologie a přípravy.
hint.coreIncinerate = Poté, co je kapacita jádra určité položky naplněna, jakékoliv další stejné přijaté položky budou [accent]zničeny[].
hint.factoryControl = Chcete-li nastavit tovární nastavení jednotky[accent]výstupní cíl[], v příkazovém režimu klikněte na tovární blok a poté klikněte pravým tlačítkem na umístění.\nJednotky, které produkuje, se tam automaticky přesunou.
hint.factoryControl.mobile = Chcete-li nastavit tovární nastavení jednotky[accent]výstupní cíl[], v příkazovém režimu klepněte na tovární blok a poté klepněte na umístění.\nJednotky, které produkuje, se tam automaticky přesunou.

gz.mine = Pohybujte se poblíž\uf8c4 [accent]měděnou rudu[] na zemi a kliknutím zahájíte těžbu.
gz.mine.mobile = Přesuň se k :ore-copper: [accent]měděné rudě[] na zemi a klepnutím začni těžit.
gz.research = Otevři :tree: strom technologií.\nVyzkoumej :mechanical-drill: [accent]mechanický vrták[], potom ho vyber z nabídky :production: vpravo dole.\nKliknutím na ložisko mědi ho umísti.
gz.research.mobile = Otevři :tree: strom technologií.\nVyzkoumej :mechanical-drill: [accent]mechanický vrták[], potom ho vyber z nabídky :production: vpravo dole.\nKlepnutím na ložisko mědi ho umísti.\n\nPotvrď stisknutím :ok: [accent]fajfky[] vpravo dole.
gz.conveyors = Vyzkoumej a umísti :conveyor: [accent]dopravníky[] pro přesun vytěžených zdrojů\nz vrtáků do jádra.\n\nKliknutím a tažením umístíš více dopravníků.\n[accent]Kolečkem[] je otočíš.
gz.conveyors.mobile = Vyzkoumej a umísti :conveyor: [accent]dopravníky[] pro přesun vytěžených zdrojů\nz vrtáků do jádra.\n\nPodrž prst na vteřinu a tažením umísti více dopravníků.
gz.drills = Rozšiř těžbu.\nUmísti více mechanických vrtáků.\nVytěž 100 mědi.
gz.lead = :lead: [accent]Olovo[] je další běžně používaný zdroj.\nPostav vrtáky pro těžbu olova.
gz.moveup = :up: Posuň se nahoru k dalším cílům.
gz.turrets = Vyzkoumej a umísti 2 věže :duo: [accent]Duo[] pro obranu jádra.\nVěže Duo vyžadují :copper: [accent]munici[] z dopravníků.
gz.duoammo = Zásobuj věže Duo :copper: [accent]mědí[] pomocí dopravníků.
gz.walls = [accent]Zdi[] mohou zabránit příchozímu poškození, aby zasáhlo budovy.\nPostav kolem věží :copper-wall: [accent]měděné zdi[].
gz.defend = Přichází nepřítel, připrav se na obranu.
gz.aa = Létající jednotky nelze snadno zničit standardními věžemi.\nVěže :scatter: [accent]Scatter[] poskytují výbornou protileteckou obranu, ale jako munici vyžadují :lead: [accent]olovo[].
gz.scatterammo = Zásobuj věž Scatter :lead: [accent]olovem[] pomocí dopravníků.
gz.supplyturret = [accent]Zásobuj věž
gz.zone1 = Toto je nepřátelská výsadková zóna.
gz.zone2 = Vše postavené v tomto okruhu bude zničeno na začátku příští vlny.
gz.zone3 = Vlna začne právě teď.\nPřiprav se.
gz.finish = Postav více věží, vytěž více zdrojů\na ubráněním všech vln [accent]dobuď sektor[].

ff.coal = Použij :mechanical-drill: [accent]mechanické vrtáky[] k těžbě :ore-coal: [accent]uhlí[].
ff.graphitepress = :tree: Vyzkoumej a umísti :graphite-press: [accent]grafitový lis[].
ff.craft = Přesuň :coal: uhlí do :graphite-press: [accent]grafitového lisu[].\nBude vydávat :graphite: grafit na všechny okolní dopravníky.\nPřesuň výstupní :graphite: grafit z :graphite-press: [accent]grafitového lisu[] do jádra.
ff.generator = :coal: Uhlí lze také použít jako palivo ve :combustion-generator: [accent]spalovacích generátorech[].\nVyzkoumej a umísti :combustion-generator: [accent]spalovací generátor[].
ff.coalpower = Vlož :coal: uhlí do generátoru pro výrobu [accent]:power: energie[].
ff.coalpower.objective = :combustion-generator: Vyrob energii
ff.node = :power-node: [accent]Energetické uzly[] přenášejí energii do blízkých bloků v dosahu.\nVyzkoumej a umísti :power-node: [accent]energetický uzel[] blízko generátoru.
ff.battery = :battery: [accent]Baterie[] ukládají energii.\nVyzkoumej a umísti :battery: [accent]baterii[] blízko uzlu.
ff.arc = Věže :arc: [accent]Arc[] ke své funkci vyžadují energii. Vyzkoumej a umísti věž :arc: [accent]Arc[] poblíž energetického uzlu.

fungalpass.tutorial1 = Použij [accent]jednotky[] k obraně budov a útoku na nepřítele.\nVyzkoumej a umísti :ground-factory: [accent]pozemní továrnu[].
fungalpass.tutorial2 = Vyber v továrně jednotky :dagger: [accent]Dagger[].\nVyrob 3 jednotky.

frontier.tutorial1 = :additive-reconstructor: [accent]Přídavný přestavovač[]\nvylepšuje jednotky 1. úrovně na 2. úroveň\npomocí :silicon: křemíku a :graphite: grafitu.\n\n[accent]Vyzkoumej a přestav\n[]:dagger:[accent] Dagger na []:mace:[accent] Mace.
frontier.tutorial2 = Nepřátelské vlny přicházejí [accent]donekonečna[], dokud nejsou všechna nepřátelská jádra [unlaunched]zničena.
frontier.tutorial3 = [accent]Zaútoč na nepřátelskou základnu rychle, aby vlny příliš nezesílily[].

atolls.destroy1 = Nejprve znič 2 nepřátelská [accent]jádra Základ[].\n[accent]Získej přístup k thoriu[].
atolls.mega1 = Vstup do [accent]příkazového režimu[] a vyber jednotky :mega:[accent]Mega[].
atolls.mega2 = Vyber příkaz  [accent]Naložit jednotky[], aby jednotky Mega zvedly pozemní jednotky.
atolls.mega3 = Přesuň jednotky Mega [accent]nad[] pozemní jednotky, aby je naložily.
atolls.mega4 = [accent]Vylož pozemní jednotky sem pro útok.
atolls.mega5 = Vyber příkaz  [accent]Vyložit náklad[], aby jednotky Mega vyložily nesené jednotky.
atolls.mega6 = Jednotky budou [accent]automaticky vyloženy[] po vybrání příkazu  Vyložit náklad.
atolls.mega7 = Jednotky Mega [accent]nevyloží[] pozemní jednotky, pokud jsou nad zdmi nebo hlubokou vodou.
atolls.mega8 = [accent]Vylož námořní jednotky sem pro útok.[]
atolls.attack1 = 1: Vylož pozemní jednotky sem a zaútoč z tohoto místa.
atolls.attack2 = 2: Případně sem vylož námořní jednotky a spusť překvapivý útok.
atolls.carry1 = Přenášení pozemních jednotek vyžaduje jednotky :mega:[accent]Mega[].
atolls.carry2 = 1: Přikaž jednotkám Mega [accent]přesunout se nad[] pozemní jednotky.
atolls.carry3 = 2: Vyber příkaz  [accent]Naložit jednotky[], aby jednotky Mega zvedly pozemní jednotky.
atolls.carry4 = 3: Vydej příkaz a přesuň nosiče Mega [accent]naložené jednotkami[].
atolls.carry5 = 4: Vyber příkaz  [accent]'Vyložit náklad'[], aby jednotky Mega vyložily pozemní jednotky.
atolls.carry6 = Tyto kroky si lze znovu prohlédnout [accent]zde[].
atolls.carry7 = Podle těchto pokynů vysaď další jednotky poblíž nepřátelské základny.
atolls.noairunit = Tato základna je příliš dobře opevněná na zničení leteckými jednotkami.
atolls.2strategies = Existují dvě strategie, jak tuto základnu zničit.

onset.mine = Kliknutím těž :beryllium: [accent]beryllium[] ze stěn.\n\nK pohybu použij [accent][[WASD].
onset.mine.mobile = Stiskni pro těžení :beryllium: [accent]beryllium[] ze stěn.
onset.research = Otevři :tree: strom technologií.\nVyzkoumej a poté umísti :turbine-condenser: [accent]turbínový kondenzátor[] na průduch.\nTím bude vyrábět [accent]energii[].
onset.bore = Vyzkoumej a umísti :plasma-bore: [accent]plazmový vrt[].\nTen automaticky těží zdroje ze stěn.
onset.power = Pro [accent]napájení[] plazmového vrtu vyzkoumej a umísti :beam-node: [accent]uzel paprsku[].\nPropoj turbínový kondenzátor s plazmovým vrtem.
onset.ducts = Vyzkoumej a umísti :duct: [accent]dukty[] pro přesun vytěžených zdrojů z plazmového vrtu do jádra.\nKliknutím a tažením umístíš více duktů.\n[accent]Kolečkem[] je otočíš.
onset.ducts.mobile = Vyzkoumej a umísti :duct: [accent]dukty[] pro přesun vytěžených zdrojů z plazmového vrtu do jádra.\n\nPodrž prst na vteřinu a tažením umísti více duktů.
onset.moremine = Rozšiř těžbu.\nUmísti více plazmových vrtů a použij paprskové uzly a dukty k jejich podpoře.\nVytěž 200 beryllia.
onset.graphite = Složitější bloky vyžadují :graphite: [accent]grafit[].\nUmísti plazmové vrty pro těžbu grafitu.
onset.research2 = Začni zkoumat [accent]továrny[].\nVyzkoumej :cliff-crusher: [accent]drtič útesů[] a :silicon-arc-furnace: [accent]křemíkovou obloukovou pec[].
onset.arcfurnace = Oblouková pec potřebuje :sand: [accent]písek[] a :graphite: [accent]grafit[] k výrobě :silicon: [accent]křemíku[].\nVyžaduje také [accent]energii[].
onset.crusher = Použij :cliff-crusher: [accent]drtiče útesů[] k těžbě písku.
onset.fabricator = Použij [accent]jednotky[] k průzkumu mapy, obraně budov a útoku na nepřítele. Vyzkoumej a umísti :tank-fabricator: [accent]výrobnu tanků[].
onset.makeunit = Vyrob jednotku.\nPomocí tlačítka "?" zobrazíš požadavky vybrané továrny.
onset.turrets = Jednotky jsou účinné, ale [accent]věže[] při správném použití poskytují lepší obranné možnosti.\nUmísti věž :breach: [accent]Breach[].\nVěže vyžadují :beryllium: [accent]munici[].
onset.turretammo = Zásobuj věž [accent]berylliem[] jako municí pomocí duktů.
onset.walls = [accent]Zdi[] mohou zabránit příchozímu poškození, aby zasáhlo budovy.\nPostav kolem věže několik :beryllium-wall: [accent]berylliových zdí[].
onset.enemies = Přichází nepřítel, připrav se na obranu.
onset.defenses = [accent]Připrav obranu:[lightgray] {0}
onset.attack = Nepřítel je zranitelný. Zahaj protiútok.
onset.cores = Nová jádra lze umisťovat na [accent]dlaždice jádra[].\nNová jádra fungují jako předsunuté základny a sdílejí zásoby zdrojů s ostatními jádry.\nUmísti jádro :core-bastion:.
onset.detect = Nepřítel tě dokáže odhalit za 2 minuty.\nPřiprav obranu, těžbu a výrobu.
onset.commandmode = Podrž [accent]shift[] pro vstup do [accent]příkazového režimu[].\n[accent]Kliknutím levým tlačítkem a tažením[] vybereš jednotky.\n[accent]Kliknutím pravým tlačítkem[] přikážeš vybraným jednotkám přesun nebo útok.
onset.commandmode.mobile = Stiskni [accent]příkazové tlačítko[] pro vstup do [accent]příkazového režimu[].\nPodrž prst a potom [accent]tažením[] vyber jednotky.\n[accent]Klepnutím[] přikážeš vybraným jednotkám přesun nebo útok.
aegis.tungsten = Wolfram lze těžit pomocí [accent]nárazového vrtáku[].\nTato stavba vyžaduje [accent]vodu[] a [accent]energii[].

split.pickup = Některé bloky lze zvednout jádrovou jednotkou.\nZvedni tento [accent]kontejner[] a umísti ho na [accent]nakladač zatížení[].\n(Výchozí klávesy pro zvednutí a upuštění jsou [[ a ])
split.pickup.mobile = Některé bloky lze zvednout jednotkou jádra.\nZvedni tento [accent]kontejner[] a polož ho na [accent]nakladač nákladu[].\n(Pro zvednutí nebo položení něčeho dlouze stiskni.)
split.acquire = Získej trochu wolframu pro stavbu jednotek.
split.build = Jednotky musí být dopraveny na druhou stranu zdi.\nUmísti dva [accent]nákladní hmotnostní urychlovače[], jeden na každou stranu zdi.\nPropoj je stisknutím jednoho a následným výběrem druhého.
split.container = Podobně jako kontejner lze i jednotky přepravovat pomocí [accent]nákladního hmotnostního urychlovače[].\nUmísti výrobnu jednotek vedle hmotnostního urychlovače, aby je naložila, a potom je pošli přes zeď k útoku na nepřátelskou základnu.

item.copper.description = Používá se ve všech typech bloků a munice.
item.copper.details = Měď. Nezvykle nadpočetný kov na Serpulu. Konstrukčně slabý, pokud není rafinovaná.
item.lead.description = Používá se v přepravě kapalin a energetických konstrukcích.
item.lead.details = Hutný, netečný materiál. Hojně používán v bateriích.\nPoznámka: Pravděpodobně toxický pro biologické formy života. Ne že by jich tady moc zbývalo.
item.metaglass.description = Používá se v přepravě kapalin a úložných konstrukcích.
item.graphite.description = Používá se v energetických komponentách a nábojích do věží.
item.sand.description = Používá se ve výrobě ostatních rafinovaných materiálů.
item.coal.description = Používá se na palivo a výrobu rafinovaný materiálů.
item.coal.details = Jeví se jako zkamenělá rostlinná hmota, zformovaná dávno před událostí, která tento svět náhodným číslem vytvořila.
item.titanium.description = Používá se v konstrukcích pro přepravu kapalin, ve vrtácích a letectví.
item.thorium.description = Používá se v bytelných konstrukcích a též jako nukleární palivo.
item.scrap.description = Používá se v tavičích a drtičích pro rafinaci na jiné materiály.
item.scrap.details = Zbytky zbytků starých konstrukcí a jednotek.
item.silicon.description = Používá se v solárních panelech, komplexní elektronice a samonaváděcích střelách do obraných věží.
item.plastanium.description = Používá se v pokročilých jednotkách, izolaci a tříštivé munici.
item.phase-fabric.description = Používá se v pokročilé elektronice a samoopravných konstrukcích.
item.surge-alloy.description = Používá se v pokročilém zbrojnictví a reakčních obranných konstrukcích.
item.spore-pod.description = Používá se pro přeměnu na ropu, výbušniny a palivo.
item.spore-pod.details = Spóry. Pravděpodobně syntetická forma života. Vydává plyn toxický pro jiné formy života. Extrémně invazivní. Vysoce hořlavý za určitých podmínek.
item.blast-compound.description = Používá se v bombách a výbušné munici.
item.pyratite.description = Používá se v zápalných zbraních a spalovacích generátorech.

#Erekir
item.beryllium.description = Používá se v mnoha typech konstrukcí a munice na Erekiru.
item.tungsten.description = Používá se ve vrtácích, pancíři a munici. Je vyžadován ke stavbě pokročilejších konstrukcí.
item.oxide.description = Používá se jako tepelný vodič a izolant pro energii.
item.carbide.description = Používá se v pokročilých konstrukcích, těžších jednotkách a munici.

liquid.water.description = Používá se pro chladicí stroje a zpracování odpadu.
liquid.slag.description = Používá se v oddělovačích pro rozdělení na jednotlivé kovy, nebo je chrlena na protivníky z věží.
liquid.oil.description = Používá se v pokročilé materiálové výrobě a jako zápalná munice.
liquid.cryofluid.description = Používá se jako chladicí kapalina v reaktorech, věžích a továrnách.

#Erekir
liquid.arkycite.description = Používá se v chemických reakcích pro výrobu energie a syntézu materiálů.
liquid.ozone.description = Používá se jako palivo a oxidační činidlo při výrobě materiálů. Středně výbušný.
liquid.hydrogen.description = Používá se při těžbě zdrojů, výrobě jednotek a opravách konstrukcí. Hořlavý.
liquid.cyanogen.description = Používá se jako munice, při stavbě pokročilých jednotek a v různých reakcích v pokročilých blocích. Vysoce hořlavý.
liquid.nitrogen.description = Používá se při těžbě zdrojů, tvorbě plynů a výrobě jednotek. Netečný.
liquid.neoplasm.description = Nebezpečný biologický vedlejší produkt reaktoru Neoplasia. Rychle se šíří do libovolného sousedního bloku obsahujícího vodu, kterého se dotkne, a poškozuje ho. Vazký.
liquid.neoplasm.details = Neoplazma. Nekontrolovatelná hmota rychle se dělících syntetických buněk s kalovitou konzistencí. Odolná vůči teplu. Extrémně nebezpečná pro všechny konstrukce pracující s vodou.\n\nPříliš složitá a nestabilní pro standardní analýzu. Možné využití neznámé. Doporučuje se spálení ve struskových jezírkách.

block.derelict = \uf77e [lightgray]Opuštěný
block.armored-conveyor.description = Přepravuje předměty vpřed. Nepřijímá předměty ze stran.
block.illuminator.description = Vydává světlo.
block.message.description = Ukládá zprávu pro komunikaci mezi spojenci.
block.reinforced-message.description = Ukládá zprávu pro komunikaci mezi spojenci.
block.world-message.description = Blok zprávy pro tvorbu map. Nelze zničit.
block.graphite-press.description = Lisuje uhlí na grafit.
block.multi-press.description = Lisuje uhlí na grafit. Vyžaduje vodu jako chladivo.
block.silicon-smelter.description = Rafinuje křemík z písku a uhlí.
block.kiln.description = Taví písek a olovo na metasklo.
block.plastanium-compressor.description = Produkuje plastan z titanu a nafty.
block.phase-weaver.description = Syntetizuje fázovou tkaninu z thoria a písku.
block.surge-smelter.description = Taví titan, olovo, křemík a měď na rázovou slitinu.
block.cryofluid-mixer.description = Míchá vodu a jemný titanový prášek na chladicí kapalinu.
block.blast-mixer.description = Vyrábí výbušninu z pyratitu a shluků spór.
block.pyratite-mixer.description = Míchá uhlí, olovo a písek na pyratit.
block.melter.description = Taví šrot na strusku.
block.separator.description = Odděluje ze strusky jednotlivé minerální součásti.
block.spore-press.description = Lisuje skluhy spór na naftu.
block.pulverizer.description = Drtí šrot na jemný písek.
block.coal-centrifuge.description = Přetváří naftu na uhlí.
block.incinerator.description = Vypařuje jakékoliv předměty nebo kapaliny, které obdrží.
block.power-void.description = Zničí jakoukoliv energii na vstupu. Jen v režimu Pískoviště.
block.power-source.description = Nekonečný zdroj energie. Jen v režimu Pískoviště.
block.item-source.description = Nekonečný zdroj předmětů. Jen v režimu Pískoviště.
block.item-void.description = Zničí jakýkoliv vstupní předmět, který bloku pošleš. Jen v režimu Pískoviště.
block.liquid-source.description = Nekonečný zdroj kapalin. Jen v režimu Pískoviště.
block.liquid-void.description = Zničí jakoukoliv kapalinu, kterou bloku pošleš. Jen v režimu Pískoviště.
block.payload-source.description = Nekonečný zdroj nákladu. Jen v režimu Pískoviště.
block.payload-void.description = Zničí jakýkoliv náklad. Jen v režimu Pískoviště.
block.copper-wall.description = Chrání konstrukce před nepřátelskými střelami.
block.copper-wall-large.description = Chrání konstrukce před nepřátelskými střelami.
block.titanium-wall.description = Chrání konstrukce před nepřátelskými střelami.
block.titanium-wall-large.description = Chrání konstrukce před nepřátelskými střelami.
block.plastanium-wall.description = Chrání konstrukce před nepřátelskými střelami. Pohlcuje laserové a energetické výboje. Automaticky blokuje energetické spoje.
block.plastanium-wall-large.description = Chrání konstrukce před nepřátelskými střelami. Pohlcuje lasery a elektrické oblouky. Automaticky blokuje energetické spoje.
block.thorium-wall.description = Chrání konstrukce před nepřátelskými střelami.
block.thorium-wall-large.description = Chrání konstrukce před nepřátelskými střelami.
block.phase-wall.description = Chrání konstrukce před nepřátelskými střelami a při zásahu odráží většinu střel.
block.phase-wall-large.description = Chrání konstrukce před nepřátelskými střelami a při zásahu odráží většinu střel.
block.surge-wall.description = Chrání konstrukce před nepřátelskými střelami. Při doteku opakovaně vydává energetické výboje.
block.surge-wall-large.description = Chrání konstrukce před nepřátelskými střelami. Při doteku opakovaně vydává energetické výboje.
block.scrap-wall.description = Chrání konstrukce před nepřátelskými projektily.
block.scrap-wall-large.description = Chrání konstrukce před nepřátelskými projektily.
block.scrap-wall-huge.description = Chrání konstrukce před nepřátelskými projektily.
block.scrap-wall-gigantic.description = Chrání konstrukce před nepřátelskými projektily.
block.door.description = Zeď, která může být otevřena a zavřena.
block.door-large.description = Zeď, která může být otevřena a zavřena.
block.mender.description = Opakovaně opravuje bloky ve svém dosahu.\nVolitelně umí použít křemík pro posílení dosahu a efektivity.
block.mend-projector.description = Opakovaně opravuje bloky ve svém dosahu.\nVolitelně umí použít fázovou tkaninu pro posílení dosahu a efektivity.
block.overdrive-projector.description = Zrychluje funkce budov v okolí.\nVolitelně umí využít fázovou tkaninu pro posílení dosahu a efektivity.
block.force-projector.description = Vytváří okolo sebe šestiúhelníkové silové pole. Chrání konstrukce a jednotky uvnitř pole před poškozením.\nPřehřívá se, pokud obdrží příliš mnoho poškození. Přehřátí lze eliminovat použitím chlazení. Fázová tkanina zvyšuje velikost pole.
block.shock-mine.description = Vydává energetické výboje při dotyku nepřátelskou jednotkou.
block.conveyor.description = Přepravuje předměty vpřed.
block.titanium-conveyor.description = Přepravuje předměty vpřed. Rychlejší, než standardní dopravník.
block.plastanium-conveyor.description = Přepravuje předměty vpřed in batches. Přijímá předměty zezadu, a vykládá je do tří směrů vpředu. Vyžaduje více nakládacích a vykládacích bodů pro špičkový průtok.
block.junction.description = Funguje jako most pro dva křížící se dopravníky.
block.bridge-conveyor.description = Přepravuje předměty přes terén nebo budovy.
block.phase-conveyor.description = Okamžitě přepravuje předměty přes terén nebo budovy. Má delší dosah než standardní přemostění přepravníku, ale vyžaduje energii.
block.sorter.description = Pokud vstupní položka odpovídá výběru, je předána vpřed. Jinak je vyložena napravo a nalevo.
block.inverted-sorter.description = Podobné stanrdardní třídičce, ale vykládá vybrané položky do stran.
block.router.description = Rozděluje vstupní položky rovnoměrně do tří výstupů.
block.router.details = Nezbytné zlo. Použití hned u produkčních vstupů se nedoporučuje, protože budou ucpány výstupnímk položkami.
block.distributor.description = Rozděluje vstupní položky rovnoměrně do sedmi výstupů.
block.overflow-gate.description = Pokud je směr vpřed ucpán, posílá vstupní položky do stran. Nelze použít vedle jiné brány.
block.underflow-gate.description = Pokud je směr do stran ucpán, posílá vstupní položky vpřed. Nelze použít vedle jiné brány.
block.mass-driver.description = Konstrukce pro přepravu položek na velkou vzdálenost. Shromáždí dávku položek a vystřelí ji k dalšímu hromadnému přenašeči.
block.mechanical-pump.description = Pumpuje kapalinu a předává ji dál. Nevyžaduje energii.
block.rotary-pump.description = Pumpuje kapalinu a předává ji dál. Vyžaduje energii.
block.impulse-pump.description = Pumpuje kapalinu a předává ji dál.
block.conduit.description = Přepravuje kapaliny vpřed. Používá se spolu s pumpami a dalším potrubím.
block.pulse-conduit.description = Přepravuje kapaliny vpřed. Přepravuje kapaliny rychleji a ukládá jich více než standardní potrubí.
block.plated-conduit.description = Přepravuje kapaliny vpřed. Nepřijímá kapaliny ze stran. Nemá úniky.
block.liquid-router.description = Přijímá kapalinu z jednoho směru a vydává ji rovnomerně do tří ostatních stran. Umí též uchovat malé množství kapaliny.
block.liquid-container.description = Ukládá značné množství kapaliny. Předává ji do stran, podobně jako směřovač kapalin.
block.liquid-tank.description = Ukládá velké množství kapaliny. Předává ji do stran, podobně jako směřovač kapalin.
block.liquid-junction.description = Funguje jako most pro dvě křížící se potrubí.
block.bridge-conduit.description = Přepravuje kapalinu přes terén a budovy.
block.phase-conduit.description = Přepravuje kapalinu přes terén a budovy. Má delší dosah než standardní přemostění potrubí, ale vyžaduje energii.
block.power-node.description = Přenáší energii mezi propojenými uzly. Uzel získává energii z nebo dodává energii do bloků ve svém poli působnosti.
block.power-node-large.description = Pokročilý energerický uzel. Má větší dosah než základní uzel.
block.surge-tower.description = Energetický uzel s dlouhým dosahem, ale méně dostupnými přípojkami pro ostatní bloky, než ostatní uzly.
block.diode.description = Energie z baterie přes tento blok protéká jen jedním směrem, a to jen za podmínky, že na druhé straně je méně energie (například vybitá baterie).
block.battery.description = Ukládá energii v případě nadbytku v síti a poskytuje energii kdykolik, když se energetické síti nedostává.
block.battery-large.description = Ukládá energii v případě nadbytku v síti a poskytuje energii kdykolik, když se energetické síti nedostává. Ukládá více energie než základní baterie.
block.combustion-generator.description = Generuje energii spalováním hořlaných materiálů, jako je například uhlí.
block.thermal-generator.description = Pokud je umístěn na teplotně aktivní místo (jako je magmatický kámen), dokáže z tepla generovat energii.
block.steam-generator.description = Vytváří energii spalováním hořlavých materiálů a měněním vody na páru.
block.differential-generator.description = Generuje velké množství energie. Využívá teplotního rozdílu mezi chladicí kapalinou a hořícím pyratitem.
block.rtg-generator.description = Používá teplo z rozpadajících se radioaktivních materiálů k výrobě energie v malých dávkách.
block.solar-panel.description = Vytváří malého množství energie ze Slunce.
block.solar-panel-large.description = Vytváří malé množství energie ze Slunce. Efektivnější než základní solární panel.
block.thorium-reactor.description = Generuje významné množství energie z thoria. Vyžaduje nepřetržité chlazení. Je-li chlazen nedostatečně, způsobí značnou explozi.
block.impact-reactor.description = Při špičkové účinnosti vytváří velké množství energie. Vyspělý generátor schopný při maximálním výkonu vytvářet obrovská množství energie. Vyžaduje však značné množství energie pro nastartování celého procesu.
block.mechanical-drill.description = Když je umístěn na rudu, donekonečna vytváří odpovídající předměty nízkou rychlostí. Použitelný jen pro těžbu základních surovin.
block.pneumatic-drill.description = Vylepšený vrt, který je schopen těžit i titan. Těží vyšší rychlostí než mechanický vrt.
block.laser-drill.description = Vrtá rychleji než pneumatický vrt díky laserové technologii, ale vyžaduje ke svému fungování energii. Dokáže navrtat i rudné žíly thoria.
block.blast-drill.description = Ultimátní vrt, vyžadující k provozu značné množství energie.
block.water-extractor.description = Extrahuje podzemní vodu. Vhodný pro místa, kde se nevyskytuje povrchová voda.
block.cultivator.description = Kultivuje drobounké koncentrace atmosférických spór do spórových polštářků.
block.cultivator.details = Zachráněná technologie. Používá se k výrobě obrovského množství biomasy tak efektivně, jak jen to jde. Pravděpodobně se původně jednalo o inkubátor spó, které nyní pokrývají Serpulo.
block.oil-extractor.description = Vyžaduje značné množství energie, písku a vody na těžení nafty.
block.core-shard.description = Jádro základny. Pokud je zničena, sektor je ztracen.
block.core-shard.details = První iterace. Kompaktní. Sebereplikující. Vybavená vysílacím pohonem na jedno použití. Není navržena pro meziplanetární cestování.
block.core-foundation.description = Jádro základny. Dobře opevněné. Pojme více surovin než jádro Odštěpek.
block.core-foundation.details = Druhá iterace.
block.core-nucleus.description = Jádro základny. Velmi dobře opevněná. Dokáže skladovat enormní množství zdrojů.
block.core-nucleus.details = Třetí a konečná iterace vývoje jádra.
block.vault.description = Ukládá velké množství předmětů od každého typu. K vyskladnění věcí z trezoru je možné použít odbavovač.
block.container.description = Ukládá menší množství předmětů od každého typu. K vyskladnění věcí z kontejneru je možné použít odbavovač.
block.unloader.description = Vyskladňuje vybrané položky z okolních bloků.
block.launch-pad.description = Vysílá dávky předmětů do přilehlých sektorů.
block.advanced-launch-pad.description = Vysílá dávky předmětů do vybraných sektorů. Pouze jeden předmět v dávce.
block.advanced-launch-pad.details = Suborbitální systém pro přepravu zdrojů z bodu do bodu.
block.landing-pad.description = Přijímá předměty z vysílacích plošin z jiných sektorů. Vyžaduje velké množství vody pro ochranu před dopady.
block.duo.description = Střílí střídavé dávky kulek na nepřátele.
block.scatter.description = Střílí kusy olova, pláty šrotu nebo střepy metaskla na nepřátelské letectvo.
block.scorch.description = Sežehne pozemní jednotky blízkosti. Velmi efektivní na malé vzdálenosti.
block.hail.description = Střílí na dálku malé patrony na pozemní nepřátele.
block.wave.description = Střílí po nepřátelích proudy kapaliny (například strusky). Umí automaticky uhasit oheň, pokud je zásobena vodou.
block.lancer.description = Po nabití střílí mocné energetické paprsky na pozemní cíle.
block.arc.description = Střílí výboje po pozemních jednotkách.
block.swarmer.description = Střílí po nepřátelích samonaváděcí střely.
block.salvo.description = Střílí na nepřátele rychlé dávky střel.
block.fuse.description = Střílí trojici pronikavých výbuchů na blízké nepřátele.
block.ripple.description = Střílí na dálku shluky střel na pozemní jednotky.
block.cyclone.description = Střílí vybuchující dávky na blízké nepřátele.
block.spectre.description = Střílí velké náboje, které pronikají brněním jak pozemních, tak vzdušných cílů.
block.meltdown.description = Po nabití střílí nepřetržitý laserový paprsek na nepřátele v okolí. Vyžaduje ke své funkci chlazení.
block.foreshadow.description = Střílí velké jednocílové blesky na dlouhé vzdálenosti. Upředňostuje nepřátele s větším max životy.
block.repair-point.description = Nepřetržitě opravuje nejbližší poškozenou jednotku v poli své působnosti.
block.segment.description = Poškozuje a ničí příchozí střely. Laserové střely ale zacílit neumí.
block.parallax.description = Střílí tažný paprsek, který přitahuje vzdušné cíle, a poškozuje je.
block.tsunami.description = Střílí mocné proudy kapalin na nepřátele. Samočinně hasí oheň, pokud je zásobován vodou.
block.silicon-crucible.description = Rafinuje křemík z písku a uhlí za použití pyratitu jako přídavného zdroje tepla. Účinnější na horkých místech.
block.disassembler.description = Odděluje ze strusky stopové množství exotických minerálových součástí při malé účinnosti. Umí vyrobit thorium.
block.overdrive-dome.description = Zvyšuje rychlost okolních konstrukcí. Vyžaduje ke svému fungování fázovou tkaninu a křemík.
block.payload-conveyor.description = Přesouvá velké náklady, jako jednotky z továren.
block.payload-router.description = Rozděluje vstuní náklad na 3 výstupní směry.
block.ground-factory.description = Vyrábí pozemní jednotky. Výstupní jednotky mohou být použity přímo, nebo přesunuty do přestavovačů na vylepšení.
block.air-factory.description = Vyrábí letecké jednotky. Výstupní jednotky mohou být použity přímo, nebo přesunuty do přestavovačů na vylepšení.
block.naval-factory.description = Vyrábí námořní jednotky. Výstupní jednotky mohou být použity přímo nebo přesunuty do přestavovačů k vylepšení.
block.additive-reconstructor.description = Vylepšuje vstupní jednotky na druhou úroveň.
block.multiplicative-reconstructor.description = Vylepšuje vstupní jednotky na třetí úroveň.
block.exponential-reconstructor.description = Vylepšuje vstupní jednotky na čtvrtou úroveň.
block.tetrative-reconstructor.description = Vylepšuje vstupní jednotky na pátou, konečnou úroveň.
block.switch.description = Přepínač. Jeho stav je možné číst a ovládat logickými procesory.
block.micro-processor.description = Spouští posloupnost logických instrukcí ve smyčce. Dá se použít k ovládání jednotek a konstrukcí.
block.logic-processor.description = Spouští posloupnost logických instrukcí ve smyčce. Dá se použít k ovládání jednotek a konstrukcí. Rychlejší než mikroprocesor.
block.hyper-processor.description = Spouští posloupnost logických instrukcí ve smyčce. Dá se použít k ovládání jednotek a konstrukcí. Rychlejší než logický procesor.
block.memory-cell.description = Ukládá informace z logického procesoru.
block.memory-bank.description = Ukládá informace z logického procesoru. Větší kapacita.
block.logic-display.description = Zobrazuje libovolnou grafiku z logického procesoru.
block.large-logic-display.description = Zobrazuje libovolnou grafiku z logického procesoru.
block.tile-logic-display.description = Zobrazuje libovolnou grafiku z logického procesoru.\nPlynule se propojuje s blízkými dlaždicovými zobrazovacími bloky.
block.interplanetary-accelerator.description = Masivní elektromagnetická věž. Urychlí jádro na únikovou rychlost pro meziplanetární vyslání.
block.repair-turret.description = Nepřetržitě opravuje nejbližší poškozenou jednotku ve svém okolí. Lze volitelně dodávat chlazení pro jeho posílení.

#Erekir
block.core-bastion.description = Jádro základny. Obrněné. Pokud je zničeno, sektor je ztracen.
block.core-citadel.description = Jádro základny. Velmi dobře obrněné. Dokáže držet více předmětů než jádro bastion.
block.core-acropolis.description = Jádro základny. Mimořádně obrněné. Dokáže držet více předmětů než jádro citadela.
block.breach.description = Střílí průbojné beryllium nebo tungstenové náboje na nepřátele
block.diffuse.description = Vystřelí dávky střel v širokém kuželu. Odráží nepřátelské cíle zpět.
block.sublimate.description = Střílí na nepřátelské cíle souvislý proud plamene. Proráží pancíř.
block.titan.description = Střílí masivní výbušné dělostřelecké granáty na pozemní cíle. Vyžaduje vodík.
block.afflict.description = Vystřelí masivní nabitou kouli tříštivého flaku. Vyžaduje zahřívání.
block.disperse.description = Střílí dávky flaku na vzdušné cíle.
block.lustre.description = Střílí pomalu se pohybující laser na jednotlivé nepřátelské cíle.
block.scathe.description = Vysílá silné střely na pozemní cíle přes velké vzdálenosti.
block.smite.description = Střílí dávky průrazných střel vysílajících blesky.
block.malign.description = Střílí salvu naváděných laserových nábojů na nepřátelské cíle. Vyžaduje rozsáhlé zahřívání.
block.silicon-arc-furnace.description = Rafinovaně vyrábí křemík z písku a grafitu.
block.oxidation-chamber.description = Přeměňuje beryllium a ozon na oxid. Jako vedlejší produkt vydává teplo.
block.electric-heater.description = Předává teplo konstrukcím. Vyžaduje velké množství energie.
block.slag-heater.description = Předává teplo konstrukcím. Vyžaduje strusku.
block.phase-heater.description = Předává teplo konstrukcím. Vyžaduje fázovou tkaninu.
block.heat-redirector.description = Přesměrovává nashromážděné teplo do jiných bloků.
block.small-heat-redirector.description = Přesměrovává nashromážděné teplo do jiných bloků.
block.heat-router.description = Rozvádí nashromážděné teplo do tří výstupních směrů.
block.electrolyzer.description = Rozkládá vodu na vodík a ozonový plyn. Vzniklé plyny vydává dvěma opačnými směry, označenými odpovídajícími barvami.
block.atmospheric-concentrator.description = Koncentruje dusík z atmosféry. Vyžaduje teplo.
block.surge-crucible.description = Tvoří rázovou slitinu z křemíku a kovů obsažených ve strusce. Vyžaduje teplo.
block.phase-synthesizer.description = Syntetizuje fázovou tkaninu z thoria, písku a ozonu. Vyžaduje teplo.
block.carbide-crucible.description = Taví grafit a wolfram na karbid. Vyžaduje teplo.
block.cyanogen-synthesizer.description = Syntetizuje kyan z arkycitu a grafitu. Vyžaduje teplo.
block.slag-incinerator.description = Spaluje netěkavé předměty nebo tekutiny. Vyžaduje strusku.
block.vent-condenser.description = Kondenzuje plyny z průduchů na vodu. Spotřebovává energii.
block.plasma-bore.description = Při umístění proti rudné stěně donekonečna vydává předměty. Vyžaduje malé množství energie.\nVolitelně využívá vodík pro zvýšení účinnosti.
block.large-plasma-bore.description = Větší plazmový vrt. Dokáže těžit wolfram a thorium. Vyžaduje vodík a energii.\nVolitelně využívá dusík pro zvýšení účinnosti.
block.cliff-crusher.description = Drtí stěny a donekonečna vyrábí písek. Vyžaduje energii. Účinnost se liší podle typu stěny.
block.large-cliff-crusher.description = Drtí stěny a donekonečna vyrábí písek. Vyžaduje energii a vodík. Účinnost se liší podle typu stěny. Volitelně spotřebovává grafit pro zvýšení účinnosti.
block.impact-drill.description = Při umístění na rudu donekonečna vydává předměty v dávkách. Vyžaduje energii a vodu.\nVolitelně využívá ozon pro zvýšení účinnosti.
block.eruption-drill.description = Vylepšený nárazový vrták. Dokáže těžit thorium. Vyžaduje vodík.\nVolitelně využívá kyanogen pro zvýšení účinnosti.
block.reinforced-conduit.description = Přesouvá tekutiny vpřed. Nepřijímá vstupy mimo potrubí ze stran.
block.reinforced-liquid-router.description = Rozděluje tekutiny rovnoměrně na všechny strany.
block.reinforced-liquid-tank.description = Ukládá velké množství tekutin.
block.reinforced-liquid-container.description = Ukládá značné množství tekutin.
block.reinforced-bridge-conduit.description = Přepravuje tekutiny přes konstrukce a terén.
block.reinforced-pump.description = Čerpá a vypouští tekutiny. Vyžaduje vodík.
block.beryllium-wall.description = Chrání struktury před nepřátelskými projektily.
block.beryllium-wall-large.description = Chrání struktury před nepřátelskými projektily.
block.tungsten-wall.description = Chrání struktury před nepřátelskými projektily.
block.tungsten-wall-large.description = Chrání struktury před nepřátelskými projektily.
block.carbide-wall.description = Chrání struktury před nepřátelskými projektily.
block.carbide-wall-large.description = Chrání struktury před nepřátelskými projektily.
block.reinforced-surge-wall.description = Chrání konstrukce před nepřátelskými projektily a při kontaktu pravidelně vypouští elektrické oblouky.
block.reinforced-surge-wall-large.description = Chrání konstrukce před nepřátelskými projektily a při kontaktu pravidelně vypouští elektrické oblouky.
block.shielded-wall.description = Chrání konstrukce před nepřátelskými projektily a většinu střel při dopadu odráží. Při dodání energie nasadí štít, který pohltí většinu projektilů. Vede energii.
block.blast-door.description = Zeď, která se otevře, když jsou v dosahu spojenecké pozemní jednotky. Nelze ji ovládat ručně.
block.duct.description = Přesouvá předměty vpřed. Dokáže uložit pouze jeden předmět.
block.armored-duct.description = Přesouvá předměty vpřed. Nepřijímá ze stran vstupy mimo dukty.
block.duct-router.description = Rozděluje předměty rovnoměrně do tří směrů. Přijímá předměty pouze zezadu. Lze ho nastavit jako třídič předmětů.
block.overflow-duct.description = Vydává předměty do stran pouze tehdy, když je cesta vpřed zablokovaná.
block.duct-bridge.description = Přesouvá předměty přes struktury a terén.
block.duct-unloader.description = Vykládá vybraný předmět z bloku za sebou. Nelze vykládat z jader.
block.underflow-duct.description = Opak přepadového duktu. Vydává dopředu, pokud jsou levá a pravá cesta zablokované.
block.reinforced-liquid-junction.description = Funguje jako křižovatka mezi dvěma křížícími se potrubími.
block.surge-conveyor.description = Přesouvá předměty v dávkách. Lze ho urychlit energií. Vede energii.
block.surge-router.description = Rovnoměrně rozděluje předměty do tří směrů z rázových dopravníků. Lze ho urychlit energií. Vede energii.
block.unit-cargo-loader.description = Vyrábí nákladní drony. Drony automaticky rozdělují předměty do míst vyložení nákladu s odpovídajícím filtrem.
block.unit-cargo-unload-point.description = Funguje jako místo vyložení pro nákladní drony. Přijímá předměty odpovídající vybranému filtru.
block.beam-node.description = Přenáší energii do ostatních bloků ortogonálně. Ukládá malé množství energie.
block.beam-tower.description = Přenáší energii do ostatních bloků ortogonálně. Ukládá velké množství energie. Dlouhý dosah.
block.beam-link.description = Přenáší energii na obrovské vzdálenosti.\nDokáže se spojit pouze se sousedními konstrukcemi nebo jinými paprskovými spoji.
block.turbine-condenser.description = Při umístění na průduchy vyrábí energii. Produkuje malé množství vody.
block.chemical-combustion-chamber.description = Vyrábí energii z arkycitu a ozonu.
block.pyrolysis-generator.description = Vyrábí velké množství energie z arkycitu a strusky. Jako vedlejší produkt produkuje vodu.
block.flux-reactor.description = Při zahřívání vyrábí velké množství energie. Vyžaduje kyan jako stabilizátor. Výstup energie a požadavky na kyan jsou úměrné vstupnímu teplu.\nExploduje, pokud není dodán dostatek kyanu.
block.neoplasia-reactor.description = Používá arkycit, vodu a fázovou tkaninu k výrobě velkého množství energie. Jako vedlejší produkt produkuje teplo a nebezpečnou neoplazmu.\nPrudce exploduje, pokud není neoplazma odváděna z reaktoru potrubím.
block.build-tower.description = Automaticky obnovuje konstrukce v dosahu a pomáhá ostatním jednotkám se stavbou.
block.regen-projector.description = Pomalu opravuje spojenecké konstrukce ve čtvercovém obvodu. Vyžaduje vodík.\nVolitelně využívá fázovou tkaninu pro zvýšení účinnosti.
block.reinforced-container.description = Ukládá malé množství předmětů. Obsah lze získat vykladači. Nezvyšuje úložnou kapacitu jádra.
block.reinforced-vault.description = Ukládá velké množství předmětů. Obsah lze získat vykladači. Nezvyšuje úložnou kapacitu jádra.
block.tank-fabricator.description = Vyrábí jednotky Stell. Vyrobené jednotky lze použít přímo nebo přesunout do přestavovačů k vylepšení.
block.ship-fabricator.description = Vyrábí jednotky Elude. Vyrobené jednotky lze použít přímo nebo přesunout do přestavovačů k vylepšení.
block.mech-fabricator.description = Vyrábí jednotky Merui. Vyrobené jednotky lze použít přímo nebo přesunout do přestavovačů k vylepšení.
block.tank-assembler.description = Sestavuje velké tanky ze vstupních bloků a jednotek. Výstupní úroveň lze zvýšit přidáním modulů.
block.ship-assembler.description = Sestavuje velké lodě ze vstupních bloků a jednotek. Výstupní úroveň lze zvýšit přidáním modulů.
block.mech-assembler.description = Sestavuje velké mechy ze vstupních bloků a jednotek. Výstupní úroveň lze zvýšit přidáním modulů.
block.tank-refabricator.description = Vylepšuje vstupní tankové jednotky na druhou úroveň.
block.ship-refabricator.description = Vylepšuje vstupní lodní jednotky na druhou úroveň.
block.mech-refabricator.description = Vylepšuje vstupní mechové jednotky na druhou úroveň.
block.prime-refabricator.description = Vylepšuje vstupní jednotky na třetí úroveň.
block.basic-assembler-module.description = Zvyšuje úroveň sestavovače, když je umístěn vedle konstrukční hranice. Vyžaduje energii. Lze ho použít jako vstup nákladu.
block.small-deconstructor.description = Dekonstruuje vstupní konstrukce a jednotky. Vrací 100 % ceny stavby.
block.reinforced-payload-conveyor.description = Přesouvá náklad vpřed.
block.reinforced-payload-router.description = Rozděluje náklad do sousedních bloků. Při nastavení filtru funguje jako třídič.
block.payload-mass-driver.description = Konstrukce pro dálkovou přepravu nákladu. Vystřeluje přijaté náklady do propojených nákladních hmotnostních urychlovačů.
block.large-payload-mass-driver.description = Konstrukce pro dálkovou přepravu nákladu. Vystřeluje přijaté náklady do propojených nákladních hmotnostních urychlovačů.
block.unit-repair-tower.description = Opravuje všechny jednotky v okolí. Vyžaduje ozon.
block.radar.description = Postupně odkrývá terén a nepřátelské jednotky ve velkém okruhu. Vyžaduje energii.
block.shockwave-tower.description = Poškozuje a ničí nepřátelské projektily v okruhu. Vyžaduje kyan.
block.canvas.description = Zobrazuje jednoduchý obrázek s předdefinovanou paletou. Lze upravovat.
block.large-canvas.description = Zobrazuje jednoduchý obrázek s předdefinovanou paletou. Lze upravovat.

unit.dagger.description = Střílí základní střely na všechny okolní nepřátele.
unit.mace.description = Střílí proudy ohně na všechny okolní nepřátele.
unit.fortress.description = Střílí dělostřelecké salvy na pozemní cíle.
unit.scepter.description = Střílí palbu nabitých střel na všechny okolní nepřátele.
unit.reign.description = Střílí palbu masivních střel pronikajících brněním na všechny okolní nepřátele.
unit.nova.description = Střílí laserové výboje, které poškozují nepřátele a opravují spojenecké konstrukce. Je schopný letu.
unit.pulsar.description = Střílí energetické oblouky, které poškozují nepřátele a opravují spojenecké struktury. Schopný letu.
unit.quasar.description = Střílí pronikavé laserové paprsky, které poškozují nepřátele a opravují spojenecké struktury. Schopný letu. Oštítovaný.
unit.vela.description = Střílí masivní nepřetržitý laserový paprsek, který poškozuje nepřátele, způsobuje požáry a opravuje spojenecké struktury. Schopný letu.
unit.corvus.description = Střílí masivní laserový paprsek, který poškozuje nepřátele a opravuje spojenecké struktury. Může překonat většinu z terénů.
unit.crawler.description = Běží směrem k nepřátelům, vybuchne a způsobí velkou explozi.
unit.atrax.description = Střílí oslabující koule strusky na pozemní cíle. Může překonat většinu z terénů.
unit.spiroct.description = Střílí mířené laserové paprsky na nepřátele, a zároveň se tím opravuje. Může překročit většinu terénu.
unit.arkyid.description = Střílí velké mířené laserové paprsky na nepřátele, a zároveň se tím opravuje. Může překročit většinu terénu.
unit.toxopid.description = Střílí na nepřátele velké energetické kazetové střely a lasery pronikající brněním. Může překročit většinu z terénů.
unit.flare.description = Střílí základní střely na okolní nepřátele.
unit.horizon.description = Pouští shluky bomb na pozemní cíle.
unit.zenith.description = Střílí salvy raket na všechny blízké nepřátele.
unit.antumbra.description = Střílí palbu střel na všechny blízké nepřátele.
unit.eclipse.description = Vystřelí dva pronikavé lasery a záplavu protivzdušných střel na všechny blízké nepřátele.
unit.mono.description = Samočinně těží měď a olovo a ukládá je do jádra.
unit.poly.description = Samočinně obnovuje zničené konstrukce a pomáhá ostatním jednotkám při stavbě.
unit.mega.description = Samočinně opravuje poškozené konstrukce. Je schopný přenést bloky a malé pozemní jednotky.
unit.quad.description = Pouští velké bomby na pozemní cíle, opravuje spojenecké konstrukce a poškozuje nepřátele. Je schopen přenést středně velké pozemní jednotky.
unit.oct.description = Chrání blízké spojence pomocí regeneračního štítu. Je schopen přenést většinu pozemních jednotek.
unit.risso.description = Střílí palbu raket a střel na všechny blízké nepřátele.
unit.minke.description = Střílí patrony a základní střely na blízké pozemní cíle.
unit.bryde.description = Střílí na nepřátele dělostřelecké granáty a rakety dlouhého doletu.
unit.sei.description = Střílí na nepřátele palbu raket a průbojných střel.
unit.omura.description = Střílí na nepřátele průrazné šrouby s dlouhým doletem. Vytváří jednotky Záře.
unit.alpha.description = Brání jádro Odštěpek před nepřáteli. Staví konstrukce.
unit.beta.description = Brání jádro Základ před nepřáteli. Staví konstrukce.
unit.gamma.description = Brání jádro Atom před nepřáteli. Staví konstrukce.
unit.retusa.description = Střílí naváděná torpéda na blízké nepřátele. Opravuje spojenecké jednotky.
unit.oxynoe.description = Střílí opravné proudy ohně na blízké spojenecké konstrukce. Sestřeluje blízké nepřátelské střely pomocí bodové obranné věže.
unit.cyerce.description = Střílí naváděcí shlukové rakety na nepřátele. Opravuje spojenecké jednotky.
unit.aegires.description = Šokuje všechny nepřátelské jednotky a struktury, které vstoupí do je energetického pole. Opravuje spojenecké jednotky.
unit.navanax.description = Střílí výbušné elektromagnetické impulzní střely, které způsobují značné poškození nepřátelským energetickým sítím, a opravuje spojenecké konstrukce. Taví blízké nepřátele čtyřmi autonomními laserovými věžemi.

#Erekir
unit.stell.description = Střílí standardní střely na nepřátelské cíle.
unit.locus.description = Střílí střídavé střely na nepřátelské cíle.
unit.precept.description = Střílí průrazné shlukové střely na nepřátelské cíle.
unit.vanquish.description = Střílí velké průrazné štěpící střely na nepřátelské cíle.
unit.conquer.description = Střílí velké průrazné kaskády střel na nepřátelské cíle. Výrazně méně ovlivněn odporem kapaliny.
unit.merui.description = Střílí dělostřelecké střely dlouhého dosahu na nepřátelské pozemní cíle. Dokáže překračovat většinu terénu.
unit.cleroi.description = Střílí dvojité granáty na nepřátelské cíle. Bodovými obrannými věžemi zaměřuje nepřátelské projektily. Dokáže překračovat většinu terénu.
unit.anthicus.description = Střílí naváděné rakety dlouhého dosahu na nepřátelské cíle. Dokáže překračovat většinu terénu.
unit.tecta.description = Střílí naváděné plazmové rakety na nepřátelské cíle. Chrání se směrovým štítem. Dokáže překračovat většinu terénu.
unit.collaris.description = Střílí tříštivé dělostřelecké střely dlouhého dosahu na nepřátelské cíle. Dokáže překračovat většinu terénu.
unit.elude.description = Střílí dvojice naváděných střel na nepřátelské cíle. Dokáže se vznášet nad tekutinami.
unit.avert.description = Střílí kroucené dvojice střel na nepřátelské cíle.
unit.obviate.description = Střílí kroucené dvojice bleskových koulí na nepřátelské cíle.
unit.quell.description = Střílí naváděné rakety dlouhého dosahu s nestabilním plazmovým štítem na nepřátelské cíle. Potlačuje nepřátelské opravné bloky konstrukcí. Útočí pouze na pozemní cíle.
unit.disrupt.description = Střílí naváděné potlačovací rakety dlouhého dosahu na nepřátelské cíle. Potlačuje nepřátelské opravné bloky konstrukcí.
unit.evoke.description = Staví konstrukce k obraně jádra Bastion. Opravuje konstrukce paprskem. Dokáže přenášet konstrukce o velikosti 2x2.
unit.incite.description = Staví konstrukce k obraně jádra Citadela. Opravuje konstrukce paprskem. Dokáže přenášet konstrukce o velikosti 2x2.
unit.emanate.description = Staví konstrukce k obraně jádra Akropolis. Opravuje konstrukce paprsky. Dokáže přenášet konstrukce o velikosti 2x2.

lst.read = Přečte číslo z připojené paměti.
lst.write = Zapíše číslo do připojené paměti.
lst.print = Přídá text do vypisovacího buferu.\nNezobrazí nic dokud [accent]Print Flush[] je použít.
lst.printchar = Přidá znak UTF-16 nebo ikonu obsahu do vypisovacího bufferu.\nNic nezobrazí, dokud není použito [accent]Print Flush[].
lst.format = Nahradí další zástupný symbol v textovém bufferu hodnotou.\nNedělá nic, pokud je vzor zástupného symbolu neplatný.\nVzor zástupného symbolu: "{[accent]číslo 0-9[]}"\nPříklad:\n[accent]print "test {0}"\nformat "example"
lst.draw = Přídá operaci do vykreslovacího buferu.\nNezobrazí nic dokud [accent]Draw Flush[] je použít.
lst.drawflush = Provede všechny [accent]Draw[] operace na zobrazovač logiky. Pak vyčistí vykreslovací bufer.
lst.printflush = Provede všechny [accent]Print[] operace do zprávy. Pak vyčistí vypisovací bufer.
lst.getlink = Získá procesorové propojení pomoci indexu. Začiná na 0.
lst.control = Ovládne budovu.
lst.radar = Lokalizuje jednotky blízko budovy s dosahem.
lst.sensor = Získá data z budovy nebo jednotky.
lst.set = Nastaví hodnotu.
lst.operation = Provede operaci na 1-2 hodnotách.
lst.end = Skočí na první počáteční instrukci.
lst.wait = Čeká určitý počet sekund.
lst.stop = Zastaví vykonávání tohoto procesoru.
lst.lookup = Vyhledá typ věci/kapaliny/jednotky/bloku pomocí ID.\nCelkový počet daného typu může být získán pomocí:\n[accent]@unitCount[] / [accent]@itemCount[] / [accent]@liquidCount[] / [accent]@blockCount[]
lst.jump = Podmíněně skočí na danou instrukci.
lst.unitbind = Nastaví další jednotku daného typu a uloží jí do [accent]@unit[].
lst.unitcontrol = Kontroluje nastavenou jednotku.
lst.unitradar = Lokalizuje jednotky kolem nastavené jednotky.
lst.unitlocate = Lokalizuje daný typ pozice/budovy kdekoliv na mapě.\nVyžaduje nastavenou jednotku.
lst.getblock = Získá data dlaždice na libovolném místě.
lst.setblock = Nastaví data dlaždice na libovolném místě.
lst.spawnunit = Vytvoří jednotku na daném místě.
lst.spawnbullet = Vytvoří střelu na daném místě.
lst.applystatus = Aplikuje nebo odstraní stavový efekt z jednotky.
lst.weathersense = Zkontroluje, zda je aktivní určitý typ počasí.
lst.weatherset = Nastaví aktuální stav určitého typu počasí.
lst.spawnwave = Zrodí vlnu.
lst.explosion = Vytvoří výbuch na daném místě.
lst.setrate = Nastaví rychlost vykonávání procesoru v instrukcích/tik.
lst.fetch = Vyhledá jednotky, jádra, hráče nebo budovy podle indexu.\nIndexy začínají na 0 a končí jejich vráceným počtem.
lst.packcolor = Zabalí složky RGBA [0, 1] do jednoho čísla pro kreslení nebo nastavování pravidel.
lst.unpackcolor = Rozbalí složky RGBA z barvy zabalené pomocí Pack Color.
lst.setrule = Nastaví pravidlo hry.
lst.flushmessage = Zobrazí na obrazovce zprávu z textového bufferu.\nPokud je proměnná pro výsledek nastavena na [accent]@wait[],\npočká, dokud předchozí zpráva neskončí.\nJinak vrátí, zda se zprávu podařilo zobrazit.
lst.cutscene = Manipuluje s kamerou hráče.
lst.setflag = Nastaví globální příznak, který mohou číst všechny procesory.
lst.getflag = Zkontroluje, zda je nastaven globální příznak.
lst.setprop = Nastaví vlastnost jednotky nebo budovy.
lst.effect = Vytvoří částicový efekt.
lst.sync = Synchronizuje proměnnou přes síť.\nOmezeno na 20× za sekundu na proměnnou.
lst.playsound = Přehraje zvuk.\nHlasitost a posun mohou být globální hodnotou nebo vypočteny podle pozice.
lst.makemarker = Vytvoří ve světě novou logickou značku.\nJe nutné zadat ID pro identifikaci této značky.\nZnačky jsou momentálně omezeny na 20 000 na svět.
lst.setmarker = Nastaví vlastnost značky.\nPoužité ID musí být stejné jako v instrukci Make Marker.\nHodnoty [accent]null []jsou ignorovány.
lst.localeprint = Přidá hodnotu vlastnosti lokalizace mapy do textového bufferu.\nPro nastavení lokalizačních balíčků mapy v editoru map zkontroluj [accent]Informace o mapě > Lokalizační balíčky[].\nPokud je klient mobilní zařízení, nejdříve se pokusí vypsat vlastnost končící na ".mobile".
lst.query = Dotazuje jednotky/budovy v určené oblasti.\nVýsledky jsou vypsány do [accent]@queries[].\nVýsledky lze číst z [accent]@queries[] pomocí instrukce [accent]Read[] a indexu.\nDélku [accent]@queries[] lze zjistit pomocí [accent]@size[] jako parametru.

