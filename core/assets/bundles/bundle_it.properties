sector.onset.description = Settore di prova. Questo obiettivo non è ancora stato creato. Aspetta ulteriori informazioni.
sector.aegis.description = Questo settore contiene giacimenti di tungsteno.\nRicerca il [accent]Impact Drill[] per estrarre questa risorsa e distruggere la base nemica nella zona.
sector.lake.description = Il lago di scorie di questo settore limita notevolmente le unità utilizzabili. Un'unità a levitazione è l'unica opzione.\nRicerca il [accent]ship fabricator[] e produci [accent]elude[] il prima possibile.
sector.intersect.description = Le scansioni suggeriscono che questo settore sarà attaccato da più fronti subito dopo l'atterraggio.\nCostruisci difese subito ed espanditi il prima possibile\nLe Unità [accent]Mech[] Saranno necessarie per il terreno ruvido della zona.
sector.atlas.description = Questo settore presenta un terreno variegato e richiederà l'impiego di diverse unità per un attacco efficace.\nPotrebbe inoltre essere necessario potenziare le unità per superare alcune delle basi nemiche più resistenti individuate in questa zona.\nRicerca il [accent]Electrolyzer[] e il [accent]Tank Refabricator[].
sector.split.description = La scarsa presenza nemica in questo settore lo rende perfetto per testare nuove tecnologie di trasporto.
sector.basin.description = Rilevata una forte presenza nemica in questo settore.\nCostruisci rapidamente unità e conquista i nuclei nemici per ottenere una posizione di vantaggio.
sector.marsh.description = Questo settore ha archicite in abbondanza, ma ha ventilazioni limitate.\nCostruisci [accent]Chemical Combustion Chambers[] per generare energia.
sector.peaks.description = Il terreno montuoso di questo settore rende inutilizzabili la maggior parte delle unità. Saranno necessarie unità aeree.\nFai attenzione alle installazioni antiaeree nemiche. Potrebbe essere possibile disattivare alcune di queste installazioni prendendo di mira gli edifici di supporto.
sector.ravine.description = Nel settore non sono state rilevate basi nemiche, nonostante si tratti di un'importante via di trasporto per il nemico. Aspettatevi una varietà di forze nemiche.\nProduci [accent]surge alloy[]. Costruisci [accent]Afflict[] turrets.
sector.caldera-erekir.description = Le risorse individuate in questo settore sono distribuite su diverse isole.\nRicerca e implementa sistemi di trasporto basati sui droni.
sector.stronghold.description = Il grande accampamento nemico in questo settore custodisce depositi significativi di [accent]thorium[].\nUtilizzalo per sviluppare unità e torrette di livello superiore.
sector.crevice.description = Il nemico invierà forze d'attacco feroci per distruggere la tua base in questo settore.\nSviuppando [accent]carbide[] e il [accent]Pyrolysis Generator[] potrebbe essere imperativo per la sopravvivenza.
sector.siege.description = Questo settore presenta due canyon paralleli che richiederanno un attacco su due fronti.\nRicerca [accent]cyanogen[] per acquisire la capacità di creare unità di carri armati ancora più potenti.\nAttenzione: sono stati rilevati missili a lungo raggio nemici. I missili potrebbero essere abbattuti prima dell'impatto.
sector.crossroads.description = Le basi nemiche in questo settore sono state stabilite su terreni di varia natura. Ricerca unità diverse per adattarti.\nInoltre, alcune basi sono protette da scudi. Scopri come vengono alimentati.
sector.karst.description = Questo settore è ricco di risorse, ma verrà attaccato dal nemico non appena atterrerà un nuovo nucleo.\nSfrutta le risorse e ricerca [accent]phase fabric[].
sector.origin.description = L'ultimo settore con una significativa presenza nemica.\nNon rimangono probabili opportunità di ricerca: concentratevi esclusivamente sulla distruzione di tutti i nuclei nemici.

