hint.depositItems = Per trasferire oggetti, trascina dalla tua nave al nucleo.
hint.respawn = Per rinascere come nave, premi [accent][[V][].
hint.respawn.mobile = Hai cambiato il controllo a unità/strutture. Per rinascere come nave, [accent]tocca the l'avatar in alto a sinistra.[]
hint.desktopPause = Premi[accent][[Space][] per mettere in pausa o riprendere il gioco.
hint.breaking = [accent]Click-destro[] e trascina per distruggere blocchi.
hint.breaking.mobile = Attiva il \ue817 [accent]martello[] in fondo a destra e tocca per distruggere blocchi.\n\nTieni premuto il tuo dito per un secondo e trascina per distruggere blocchi in una selezione.
hint.blockInfo = Visualizza le informazioni di un blocco selezionandolo nell' [accent]build menu[], quindi selezionando il [accent][[?][] pulsante a destra.
hint.derelict = [accent]Derelict[] Le strutture sono i resti in rovina di vecchie basi che non sono più funzionanti.\n\nQueste strutture possono essere [accent]Smantellate[] per le risorse.
hint.research = Usa il pulsante \ue875 [accent]Scopri[] per scoprire nuova tecnologia.
hint.research.mobile = Usa il pulsante \ue875 [accent]Ricerca[] nel \ue88c [accent]menu[] per scoprire  una nuova tecnologia.
hint.unitControl = Tieni premuto [accent][[L-ctrl][] e [accent]clic[] per controllare unità o torrette amichevoli.
hint.unitControl.mobile = [accent][[Doppio-tocco][] per controllare unità o torrette amichevoli.
hint.unitSelectControl = Per controllare le unità, inserire [accent]command mode[] tenendo [accent]L-shift.[]\nIn modalità comando, fai clic e trascina per selezionare le unità. [accent]Right-click[] una posizione o un obiettivo per comandare unità in quella zona.
hint.unitSelectControl.mobile = Per controllare le unità, inserire [accent]command mode[] premendo il [accent]command[] pulsante in basso a sinistra.\nIn modalità comando, tieni premuto e trascina per selezionare le unità. Tocca una posizione o un bersaglio per impartire comandi alle unità presenti in quel punto.
hint.launch = Una volta che sono state raccolte abbastanza risorse, puoi[accent]Lanciare[] selezionando settori vicini dalla \ue827 [accent]Mappa[] in fondo a destra.
hint.launch.mobile = Una volta che sono state raccolte abbastanza risorse, puoi[accent]Lanciare[] selezionando settori vicini dalla \ue827 [accent]Mappa[] nel \ue88c [accent]menu[].
hint.schematicSelect = Tieni premuto [accent][[F][] e trascina per selezionare blocchi da copiare ed incollare.\n\n[accent][[Middle Click][] per copiare un singolo tipo di blocco.
hint.rebuildSelect = Mantieni [accent][[B][] trascina e seleziona i progetti dei blocchi distrutti.\nQuesto li ricostruirà automaticamente.
hint.rebuildSelect.mobile = Seleziona il \ue874 pulsante copia, quindi tocca il \ue80f Fai clic sul pulsante "Ricostruisci" e trascina per selezionare i progetti dei blocchi distrutti.\nQuesto li ricostruirà automaticamente.
hint.conveyorPathfind = Tieni premuto [accent][[L-Ctrl][] mentre trascini nastri per generare automaticamente un percorso.
hint.conveyorPathfind.mobile = Attiva la \ue844 [accent]modalità diagonale[] e trascina nastri per generare automaticamente un percorso.
hint.boost = Tieni premuto [accent][[L-Shift][] per volare sopra gli ostacoli con la tua unità attuale.\n\nSolo poche unità terrestri possono farlo.
hint.payloadPickup = Premi [accent][[[] per raccogliere piccoli blocchi o unità.
hint.payloadPickup.mobile = [accent]Clicca e trattieni[] piccoli blocchi o unità per raccglierla.
hint.payloadDrop = Premi [accent]][] per rilasciare un carico.
hint.payloadDrop.mobile = [accent]Clicca e trattieni[] una posizione vuota per rilasciarci un carico.
hint.waveFire = [accent]Idrogetto[] torrette con acqua per munizioni spegneranno automaticamente incendi.
hint.guardian = Unità [accent]Guardiano[] sono corazzate. Munizioni deboli come [accent]Rame[] e [accent]Piombo[] sono [scarlet]inefficaci[].\n\nUsa torrette di grado superiore o \uf835 [accent]Grafite[] \uf861Duo/\uf859Cannone Leggero per buttare giù il boss.
hint.coreUpgrade = I nuclei possono essere aggiornati [accent]piazzando nuclei di un livello superiore sopra di loro[].\n\nPiazzia un nucleo \uf868 [accent]Fondazione[] sopra il nucleo \uf869 [accent]Frammento[]. Assicurati che sia libero da ostacoli.
hint.serpuloCoreZone = Ulteriori nuclei possono essere costruiti sulle :core-zone: [accent]Core Zone[] piastrelle.
hint.cannotUpgrade = Un [red]:tree:[] L'icona sopra un'unità di carico utile indica che la sua versione aggiornata non è ancora stata ricercata.\n\nGli aggiornamenti delle unità devono essere ricercati nel [accent]:tree: Albero Ricerche[] prima che possano essere prodotti nei ricostruttori.
hint.presetLaunch = [accent]Settori grigi d'atterraggio[], come [accent]Foresta Ghiacciata[], possono essere lanciati da ovunque. Non richiedono la cattura nei terrotori circostanti.\n\n[accent]Settori numerati[], come questo qui, sono [accent]opzionali[].
hint.presetDifficulty = Questo settore ha un[scarlet]alto livello di minaccia nemica[].\nIl lancio in tali settori [accent]non raccomandato[] senza tecnologia e preparazione adeguate.
hint.coreIncinerate = Dopo che il nucleo è stato riempito al massimo con un oggetto, tutti gli oggetti extra di quel tipo che riceve saranno[accent]incenerati[].
hint.factoryControl = Per impostare a un'unità di fabbrica una[accent]destinazione di uscita[], Fai clic su un blocco fabbrica mentre sei in modalità comando, quindi fai clic con il pulsante destro del mouse su una posizione.\nLe unità prodotte da esso si sposteranno automaticamente lì.
hint.factoryControl.mobile = Per impostare in un unità di fabbrica una [accent]destinazione di uscita[], Tocca un blocco fabbrica mentre sei in modalità comando, quindi tocca una posizione.\nLe unità prodotte da esso si sposteranno automaticamente in quella posizione.

gz.mine = Muoviti vicino il \uf8c4 [accent]giacimento di rame[] a terra e premilo per scavarlo.
gz.mine.mobile = Muoviti vicino il \uf8c4 [accent]giacimento di rame[] sul terreno e toccalo per iniziare a estrarre.
gz.research = Apri l' \ue875 albero scoperte.\nRicerca la \uf870 [accent]Trivella Meccanica[], quindi selezionalo dal menu in basso a destra.\nFai clic su un giacimento di rame per posizionarla.
gz.research.mobile = Apri l' \ue875 albero scoperte\nRicerca la \uf870 [accent]Trivella Meccanica[], quindi selezionalo dal menu in basso a destra.\nFai clic su un giacimento di rame per posizionarla.\n\nPremi la \ue800 [accent]Spunta di Conferma[] in basso a destra per confermare.
gz.conveyors = Ricerca e posiziona \uf896 [accent]nastro trasportatore[] per muovere le risorse estratte\ndalla trivella al nucleo.\n\nFai clic e trascina per posizionare più nastri trasportatori.\n[accent]ruota[] per girarla.
gz.conveyors.mobile = Ricerca e posiziona \uf896 [accent]nastro trasportatore[] per muovere le risorse estratte\ndalla trivella al nucleo.\n\nTieni premuto il dito per un secondo e trascina per posizionare più nastri trasportatori.
gz.drills = Espandere l'attività mineraria.\nPosizionare più trivelle meccaniche.\nEstrai 100 risorse di rame.
gz.lead = \uf837 [accent]Piombo[] è un'altra risorsa comunemente utilizzata.\nInstalla delle trivelle meccaniche per estrarre il piombo.
gz.moveup = \ue804 Muoviti sopra per ricevere altri obiettivi
gz.turrets = Ricerca e posiziona 2 \uf861 [accent]Torretta Duo[] per difendere il nucleo.\nLe torrette duo richiedono \uf838 [accent]munizioni[] dai nastri trasportatori.
gz.duoammo = Fornire le torrette Duo con [accent]rame[], usando i nastri trasportatori.
gz.walls = [accent]Le Mura[] possono impedire che i danni in arrivo raggiungano gli edifici.\nPosiziona \uf8ae [accent]Muri di Rame[] attorno alle torrette.
gz.defend = Nemici in arrivo, preparati a difenderti.
gz.aa = Le unità volanti non possono essere facilmente abbattute con torrette standard.\n\uf860 La torretta [accent]Cannone a Dispersione[] ha un ottima capacità antiaerea, ma richiede \uf837 [accent]piombo[] come munizioni
gz.scatterammo = Rifornisci il cannone a dispersione con il [accent]piombo[], usando i nastri trasportatori.
gz.supplyturret = [accent]Rifornisci la Torretta
gz.zone1 = Questa è la zona di atterraggio nemica.
gz.zone2 = Tutto ciò che è costruito nel raggio d'azione viene distrutto all'inizio di un'onda.
gz.zone3 = Sta per iniziare un'ondata.\n Preparati.
gz.finish = Costruisci più torrette, estrai più risorse e difenditi da tutte le ondate. [accent]conquistare il settore[].

ff.coal = Usa La :mechanical-drill: [accent]Trivella Meccanica[] Per Estrarre :ore-coal: [accent]Carbone[].
ff.graphitepress = :tree: Ricerca e piazza :graphite-press: [accent]Pressa per Grafite[].
ff.craft = Trasporta :coal: Carbone nella :graphite-press: [accent]Pressa per Grafite[].\nProdurrà :graphite: Grafite a tutti i nastri trasportatori vicini.\nTrasporta la :graphite: Grafite dalla :graphite-press: [accent]Pressa per Grafite[] nel Nucleo.
ff.generator = :coal: Il Carbone può essere utilizzato anche come combustibile nel :combustion-generator: [accent]Generatore a Combustione[].\nRicerca e posiziona un :combustion-generator: [accent]Generatore a Combustione[].
ff.coalpower = Immetti :coal: Carbone nel generatore per produrre [accent]:power: Energia[].
ff.coalpower.objective = :combustion-generator: Produce Energia
ff.node = :power-node: [accent]Nodo Energetico[] Trasmette energia nei blocchi vicini.\nRicerca e posiziona un :power-node: [accent]Nodo Energetico[] vicino al Generatore.
ff.battery = le :battery: [accent]Batterie[] conservano energia.\nRicerca e posiziona una :battery: [accent]Batteria[] vicino a un Nodo Energetico.
ff.arc = :arc: La Torretta [accent]Arco Elettrico[] Richiede energia per funzionare. Ricerca e posiziona la torretta :arc: [accent]Arco Elettrico[] vicino ad un Nodo Energetico.

fungalpass.tutorial1 = Usa le [accent]unità[] per difendere gli edifici e attaccare il nemico.\nRicerca e posiziona :ground-factory: [accent]fabbrica terrestre[].
fungalpass.tutorial2 = Seleziona l'unità :dagger: [accent]Pugnalatore[] nella fabbrica.\nProduci 3 unità.

frontier.tutorial1 = Il :additive-reconstructor: [accent]Ricostruttore Adattivo[]\nPotenzia le unità dal grado 1 al 2\nUsando :silicon: silicio e :graphite: grafite.\n\n[accent]Ricerca e migliora t\nun []:dagger:[accent] pugnalatore in un []:mace:[accent] Randellatore.
frontier.tutorial2 = Le ondate nemiche spediscono [accent]infinitamente[] unità finche tutti i nuclei non saranno [unlaunched]distrutti.
frontier.tutorial3 = [accent]Attacca rapidamente la base nemica per evitare che le ondate diventino troppo numerose.[].

atolls.destroy1 = Distruggi i 2 [accent]Nuclei: Fondamenti[] prima.\n[accent]Ottieni l'accesso al torio[].
atolls.mega1 = Entra in [accent]Modalità comando[] e seleziona l'unità :mega:[accent]Riparatore[].
atolls.mega2 = Seleziona il comando \ue87b [accent]Carica Unità[] per far si che il Riparatore raccolga un unità di terra.
atolls.mega3 = Muovi l'unità Riparatore [accent]sopra[] l'unita terrestre per caricarla.
atolls.mega4 = [accent]Rilascia l'unità terrestre qui per attaccare.
atolls.mega5 = Seleziona il comando \ue879 [accent]Rilascia Carico[] per far si che l'unità riparatore rilasci le unità.
atolls.mega6 = Le unità saranno [accent]automaticamente rilasciate[] mentre il \ue879 comando Rilascia Carico sarà premuto.
atolls.mega7 = Le unità riparatore [accent]non[] rilasceranno unità terrestri mentre sono su muri o acqua profonda.
atolls.mega8 = [accent]Rilascia le unità navali per attaccare.[]
atolls.attack1 = 1: Rilascia qui le unità di terra per attaccare da questa posizione.
atolls.attack2 = 2: Altrimenti, Rilascia qui le unità navali per iniziare un attacco a sorpresa.
atolls.carry1 = Trasportare le unità richiede :mega:unità [accent]riparatori[].
atolls.carry2 = 1: Comanda l'unità riparatore[accent]muoversi sulle[] unità terrestri.
atolls.carry3 = 2: Seleziona il comando \ue87b [accent]Raccogli Carico[] in modo da raccogliere l'unità terrestre con il riparatore.
atolls.carry4 = 3: Comanda e muovi i mega-portaerei [accent]loaded with units[].
atolls.carry5 = 4: Seleziona il comando \ue879 [accent]'Rilascia Carico'[] in modo che l'unita riparatore rilasci le unità a terra.
atolls.carry6 = Questi step possono essere rivisti [accent]qui[].
atolls.carry7 = Segui queste istruzioni per paracadutare altre unità vicino alla base nemica.
atolls.noairunit = Questa base è troppo ben fortificata per essere distrutta dalle unità aeree.
atolls.2strategies = Esistono due strategie per distruggere questa base.

onset.mine = Clicca per estrarre \uf748 [accent]berillio[] dalle mura.\n\nUsa [accent][[WASD] per muoverti.
onset.mine.mobile = clicca per estrarre \uf748 [accent]berillio[] dalle mura.
onset.research = Apri \ue875 L'albero scoperte.\nRicerca e posiziona un \uf73e [accent]Condensatore a Turbina[] nello sfiato.\nQuesto genera [accent]Energia[].
onset.bore = Ricerca e posiziona una \uf741 [accent]Trivella al Plasma[].\nQuesta estrae automaticamente le risorse dal muro.
onset.power = Per [accent]alimentare[] la Trivella al Plasma, ricerca e posiziona un \uf73d [accent]nodo a raggio[].\nConnetti la turbina a condensazione alla Trivella al Plasma.
onset.ducts = Ricerca e posiziona i \uf799 [accent]condotti[] per spostare le risorse estratte dalla Trivella al Plasma al nucleo.\nFai clic e trascina per posizionare più condotti.\n[accent]Scorri[] per ruotare.
onset.ducts.mobile = Ricerca e posiziona \uf799 [accent]ducts[] per spostare le risorse estratte dalla Trivella al Plasma al nucleo.\n\nTieni premuto il dito per un secondo e trascina per posizionare più condotti.
onset.moremine = Espandi l'attività mineraria.\nPosiziona più Trivelle al Plasma e usa i nodi a raggio ed i condotti per supportarle.\nEstrai 200 berilli.
onset.graphite = Blocchi più complessi richiedono \uf835 [accent]Grafite[].\nInstalla più Trivelle al Plasma per estrarre Grafite.
onset.research2 = Inizia a ricercare [accent]fabbriche[].\nRicerca il \uf74d [accent]frantumatore di scogliere[] e \uf779 [accent]Forno ad Arco di Silicio[].
onset.arcfurnace = Il Forno ad Arco di Silicio richiede \uf834 [accent]sabbia[] e \uf835 [accent]Grafite[] per creare \uf82f [accent]silicio[].\nè anche richiesta [accent]Energia[] .
onset.crusher = Usa \uf74d [accent]frantumatore di scoglieres[] per estrarre sabbia.
onset.fabricator = Usa [accent]unità[] per esplorare la mappa, difendi gli edifici, e attacca il nemico. ricerca e posiziona a \uf6a2 [accent]fabbricatore di carri[].
onset.makeunit = Produci un'unità.\nUsa il pulsante "?" per visualizzare i requisiti di fabbrica selezionati.
onset.turrets = Le unità sono efficienti, ma le [accent]torrette[] forniscono migliori capacità difensive se utilizzate efficacemente.\nPosiziona una torretta \uf6eb [accent]Breach[].\nLe torrette richiedono \uf748 [accent]Munizioni[].
onset.turretammo = Rifornisci la torretta con [accent]munizioni al berillio[]
onset.walls = Le [accent]mura[] può impedire che i danni in arrivo raggiungano gli edifici.\nPosiziona delle \uf6ee [accent]mura di berillio[] attorto alle torrette.
onset.enemies = Nemico in arrivo, preparati a difenderti.
onset.defenses = [accent]Installa le difese:[lightgray] {0}
onset.attack = Il nemico è vulnerabile. Contrattacca.
onset.cores = È possibile posizionare nuovi nuclei sulle [accent]caselle per nuclei[].\nI nuovi nuclei fungono da basi avanzate e condividono un inventario di risorse con gli altri nuclei.\nPosiziona un \uf725 Nucleo.
onset.detect = Il nemico sarà in grado di individuarti in 2 minuti.\nInstalla difese, attività minerarie e di produzione.
onset.commandmode = Tieni premuto [accent]shift[] per entrare in [accent]modalità comando[].\n[accent]Fai clic con il pulsante sinistro del mouse e trascina[] per selezionare le unità.\n[accent]Tasto destro[] per dare ordini alle unità selezionate per muoverle o farle attaccare
onset.commandmode.mobile = premi il tasto [accent]modalità comando[] per entrare in [accent]modalità comando[].\nTieni premuto un dito, poi [accent]trascina[] per selezionare le unità.\n[accent]Tap[] per dare ordini alle unità selezionate per muoverle o farle attaccare
aegis.tungsten = Il tungsteno può essere estratto utilizzando una [accent]Trivella ad Impatto[].\nQuesta struttura richiede [accent]acqua[] e [accent]energia[].

split.pickup = Alcuni blocchi possono essere raccolti dall'unità centrale.\nRaccogli questo [accent]container[] e posizionalo sul [accent]Caricatore carichi[].\n(tasti di default sono [ and ] per raccogliere e rilasciare)
split.pickup.mobile = Alcuni blocchi possono essere raccolti dall'unità centrale.\nRaccogli questo [accent]container[] e posizionarlo sul [accent]Caricatore carichi[].\n(Per raccogliere o rilasciare qualcosa, tienilo premuto...)
split.acquire = È necessario procurarsi del tungsteno per costruire le unità..
split.build = Le unità devono essere trasportate dall'altro lato del muro.\nPosiziona due [accent]Lanciatori di Massa[], uno in ogni parte del muro.\nCrea il collegamento premendo prima uno di essi e poi selezionando l'altro.
split.container = Simile al container, anche le unità possono essere trasportate utilizzando un [accent]Lanciatore di Massa[].\nPosiziona un fabbricatore di unità accanto a un lanciatore per caricarle, inviandole oltre il muro per attaccare la base nemica.

item.copper.description = Usato in molti tipi di costruzioni e munizioni.
item.copper.details = Rame. Metallo anormalmente abbondante su Serpulo. Strutturalmente debole se non rinforzato.
item.lead.description = Usato nel trasporto di liquidi e strutture elettriche.
item.lead.details = Denso. Inerte. Ampiamente utilizzato in batterie.\nNota: Probabilmente tossico per le forme di vita biologica. Non che siano rimaste in molti qui.
item.metaglass.description = Usato nelle strutture per il trasporto/immagazzinamento dei liquidi.
item.graphite.description = Usato nei componenti elettrici e come munizione per le torrette.
item.sand.description = Usata per la produzione di altri materiali raffinati.
item.coal.description = Usato per la produzione di combustibili e materiali più raffinati.
item.coal.details = Sembra siano resti organici fossilizzati di piante, formati prima dell'evento di semina.
item.titanium.description = Usato nelle strutture per il trasporto dei liquidi e per le trivelle.
item.thorium.description = Utilizzato per la costruzione delle strutture più robuste e come combustibile nucleare.
item.scrap.description = Utilizzato nel fonditore e nel polverizzatore per essere raffinato in altri materiali.
item.scrap.details = Detriti di vecchie strutture e unità abbandonate.
item.silicon.description = Usato nei pannelli solari, circuiti complessi e come munizione per certe torrette.
item.plastanium.description = Utilizzato per le unità avanzate e come munizione.
item.phase-fabric.description = Usato nei circuiti avanzati e per le strutture autoriparanti.
item.surge-alloy.description = Usato come munizione per torrette avanzate.
item.spore-pod.description = Utilizzato per la conversione in petrolio, esplosivi e carburante.
item.spore-pod.details = Spore. Probabilmente una forma di vita sintetica. Emettono gas tossici per altre vite biologiche. Estremamente invasive. Altamente infiammabili in certe condizioni.
item.blast-compound.description = Un composto altamente volatile, utilizzato nella produzione di bombe ed esplosivi. Può essere utilizzato come combustibile anche se non è consigliabile.
item.pyratite.description = Una sostanza molto infiammabile che viene utilizzata nelle armi da fuoco.

#Erekir
item.beryllium.description = Utilizzato in molti tipi di costruzioni e munizioni su Erekir.
item.tungsten.description = Utilizzato in trivelle, armature e munizioni. Indispensabile nella costruzione di strutture più complesse.
item.oxide.description = Utilizzato come conduttore di calore e isolante per applicazioni elettriche.
item.carbide.description = Utilizzato in strutture avanzate, unità più pesanti e munizioni.

liquid.water.description = Utilizzato per il raffreddamento di macchinari ed il trattamento dei rifiuti.
liquid.slag.description = Raffinata nei separatori in diversi metalli o spruzzata sui nemici come munizione.
liquid.oil.description = Usato nella produzione di materiali avanzati e come munizione incendiaria.
liquid.cryofluid.description = Usato come refrigerante in reattori, torrette e macchinari.

#Erekir
liquid.arkycite.description =Utilizzato nelle reazioni chimiche per la generazione di energia e la sintesi di materiali.
liquid.ozone.description = Utilizzato come agente ossidante nella produzione di materiali e come combustibile. Moderatamente esplosivo.
liquid.hydrogen.description = Utilizzato nell'estrazione di risorse, nella produzione di unità e nella riparazione di strutture. Infiammabile.
liquid.cyanogen.description = Utilizzato per munizioni, costruzione di unità avanzate e varie reazioni in blocchi avanzati. Altamente infiammabile.
liquid.nitrogen.description = Utilizzato nell'estrazione di risorse, nella produzione di gas e nella produzione unitaria. Inerte.
liquid.neoplasm.description = Un pericoloso sottoprodotto biologico del reattore Neoplasia. Si diffonde rapidamente a qualsiasi blocco contenente acqua con cui entra in contatto, danneggiandolo nel processo. Viscoso.
liquid.neoplasm.details = Neoplasma. Una massa incontrollabile di cellule sintetiche in rapida divisione con una consistenza fangosa. Resistente al calore. Estremamente pericolosa per qualsiasi struttura che coinvolga l'acqua.\n\nTroppo complessa e instabile per le analisi standard. Applicazioni potenziali sconosciute. Si raccomanda l'incenerimento in vasche di scorie.

block.derelict = \uf77e [lightgray]Derelict
block.armored-conveyor.description = Trasporta gli oggetti. Non accetta oggetti dai lati.
block.illuminator.description = Emette luce.
block.message.description = Memorizza un messaggio per le comunicazioni tra alleati.
block.reinforced-message.description = Memorizza un messaggio per le comunicazioni tra alleati.
block.world-message.description = Un blocco di messaggio utilizzabile nella creazione di mappe. Non può essere distrutto.
block.graphite-press.description = Comprime il carbone in grafite.
block.multi-press.description = Comprime il carbone in grafite. Necessite di acqua come refrigerante.
block.silicon-smelter.description = Raffina il silicio da sabbia e carbone.
block.kiln.description = Fonde sabbia e piombo in vetro metallico.
block.plastanium-compressor.description = Produce plastanio da petrolio e titanio.
block.phase-weaver.description = Sintetizza il tessuto di fase da torio e sabbia.
block.surge-smelter.description = Fonde titanio, piombo, silicio e rame nella lega di sovratensione.
block.cryofluid-mixer.description = Miscela acqua e polvere di titanio per produrre il criofluido.
block.blast-mixer.description = Produce composto esplosivo dalla Piratite e dal baccello di spore.
block.pyratite-mixer.description = Miscela carbone, piombo e sabbia in Piratite.
block.melter.description = Fonde i rottami in scorie.
block.separator.description = Raffina le scorie nei minerali che le compongono.
block.spore-press.description = Comprime i baccelli di spore in petrolio.
block.pulverizer.description = Polverizza i rottami in sabbia.
block.coal-centrifuge.description = Trasforma il petrolio in carbone.
block.incinerator.description = Distrugge ogni oggetto o liquido che riceve.
block.power-void.description = Distrugge l'energia in entrata. Disponibile solo nella modalità creativa.
block.power-source.description = Genera energia infinita. Disponibile solo nella modalità creativa.
block.item-source.description = Genera oggetti infiniti. Disponibile solo nella modalità creativa.
block.item-void.description = Distrugge tutti gli oggetti che riceve. Disponibile solo nella modalità creativa.
block.liquid-source.description = Genera liquidi infiniti. Disponibile solo nella modalità creativa.
block.liquid-void.description = Distrugge qualsiasi liquido che riceve. Disponibile solo nella modalità creativa.
block.payload-source.description = Genera payload all'infinito. Solo in ambiente sandbox.
block.payload-void.description = Distrugge qualsiasi payloads. Solo in ambiente Sandbox.
block.copper-wall.description = Protegge le strutture dai proiettili nemici.
block.copper-wall-large.description = Protegge le strutture dai proiettili nemici.
block.titanium-wall.description = Protegge le strutture dai proiettili nemici.
block.titanium-wall-large.description = Protegge le strutture dai proiettili nemici.
block.plastanium-wall.description = Protegge le strutture dai proiettili nemici. Assorbe i raggi laser e gli archi elettrici. Absorbs lasers and electric arcs. Blocca le connessioni automatiche dei nodi energetici.
block.plastanium-wall-large.description = Protegge le strutture dai proiettili nemici. Assorbe i raggi laser e gli archi elettrici. Absorbs lasers and electric arcs. Blocca le connessioni automatiche dei nodi energetici.
block.thorium-wall.description = Protegge le strutture dai proiettili nemici.
block.thorium-wall-large.description = Protegge le strutture dai proiettili nemici.
block.phase-wall.description = Protegge le strutture dai proiettili nemici riflettendone la maggior parte all'impatto.
block.phase-wall-large.description = Protegge le strutture dai proiettili nemici riflettendone la maggior parte all'impatto.
block.surge-wall.description = Protegge le strutture dai proiettili nemici rilasciando periodicamente archi elettrici al contatto.
block.surge-wall-large.description = Protegge le strutture dai proiettili nemici rilasciando periodicamente archi elettrici al contatto.
block.scrap-wall.description = Protegge le strutture dai proiettili nemici.
block.scrap-wall-large.description = Protegge le strutture dai proiettili nemici.
block.scrap-wall-huge.description = Protegge le strutture dai proiettili nemici.
block.scrap-wall-gigantic.description = Protegge le strutture dai proiettili nemici.
block.door.description = Un muro che può essere aperto o chiuso.
block.door-large.description = Un muro che può essere aperto o chiuso.
block.mender.description = Ripara periodicamente i blocchi nelle sue vicinanze.\nAccetta silicio per aumentare la portata e l'efficienza.
block.mend-projector.description = Ripara periodicamente i blocchi nelle sue vicinanze.\nAccetta tessuto di fase per aumentare la portata e l'efficienza.
block.overdrive-projector.description = Aumenta la velocità delle strutture vicine.\nAccetta tessuto di fase per aumentare la portata e l'efficienza.
block.force-projector.description = Crea un campo di forza esagonale attorno a se proteggendo le strutture e le unità dai proiettili nemici.\nSi surriscalda se subisce troppi colpi. Accetta liquidi refrigeranti per prevenire il surriscaldamento. Il tessuto di fase aumenta la portata dello scudo.
block.shock-mine.description = Rilascia archi elettrici al contatto con un nemico.
block.conveyor.description = Trasporta gli oggetti.
block.titanium-conveyor.description = Trasporta gli oggetti. È più veloce di un nastro trasportatore standard.
block.plastanium-conveyor.description = Trasporta gli oggetti in lotti. Accetta gli oggetti dal retro e li scarica in tre direzioni. Necessita di molteplici punti di carico e scarico per aumentare la portata.
block.junction.description = Funge da ponte tra due nastri trasportatori che si incrociano.
block.bridge-conveyor.description = Trasporta gli oggetti sopra blocchi e strutture.
block.phase-conveyor.description = Trasporta gli oggetti sopra blocchi e strutture istantaneamente. Ha un raggio più ampio rispetto al nastro trasportatore sopraelevato, ma ha bisogno di energia per funzionare.
block.sorter.description = Se un oggetto in  ingresso corrisponde al filtro selezionato, passa avanti. Altrimenti l'oggetto viene deviato a destra e sinistra.
block.inverted-sorter.description = Simile al filtro comune ma devia a destra e sinistra gli oggetti se corrispondono al filtro selezionato.
block.router.description = Distribuisce equamente gli oggetti in entrata nelle 3 uscite.
block.router.details = Un male necessario. L'uso dei distributori accanto agli input di produzione non è consigliato poiché verrebbero intasati dall'output.
block.distributor.description = Distribuisce equamente gli oggetti in entrata nelle 7 uscite.
block.overflow-gate.description = Devia gli oggetti a destra e a sinistra solo se l'uscita anteriore è bloccata. Non può essere usato insieme ad altri blocchi per la gestione degli oggetti.
block.underflow-gate.description = L'esatto opposto del separatore per eccesso. Devia gli oggetti verso l'uscita anteriore solo se le uscite laterali sono bloccate. Non può essere usato insieme ad altri blocchi per la gestione degli oggetti.
block.mass-driver.description = Struttura per il trasporto di oggetti a lungo raggio. Immagazzina lotti di oggetti e li spara ad un altro trasportatore di massa.
block.mechanical-pump.description = Pompa liquidi. Non richiede energia.
block.rotary-pump.description = Pompa liquidi. Richiede energia.
block.impulse-pump.description = Pompa liquidi.
block.conduit.description = Trasporta i liquidi. Spesso usato insieme a pompe e altri condotti.
block.pulse-conduit.description = Trasporta i liquidi più velocemente. Ha una capacità maggiore rispetto ai condotti tradizionali.
block.plated-conduit.description = Trasporta i liquidi. Non accetta liquidi dai lati. Non spande.
block.liquid-router.description = Accetta liquidi da un lato e li divide equamente nelle 3 uscite. Può anche immagazzinare una piccola quantità di liquido.
block.liquid-container.description = Stores a sizeable amount of liquid. Outputs to all sides, similarly to a liquid router.
block.liquid-tank.description = Immagazzina una grande quantità di liquido. Emette il liquido che contiene da tutti i lati, simile ad un distributore di liquidi.
block.liquid-junction.description = Funge da ponte tra due condotti che si incrociano.
block.bridge-conduit.description = Trasporta i liquidi sopra blocchi e strutture.
block.phase-conduit.description = Trasporta i liquidi sopra blocchi e strutture istantaneamente. Ha un raggio più ampio rispetto al condotto sopraelevato, ma ha bisogno di energia per funzionare.
block.power-node.description = Trasmette l'energia ai nodi connessi. Il nodo riceve e trasmette l'energia a tutti i blocchi adiacenti.
block.power-node-large.description = Un nodo energetico avanzato con un raggio maggiore.
block.surge-tower.description = Un nodo energetico a lungo raggio ma con poche connessioni disponibili.
block.diode.description = Dirige l'energia delle batterie in una direzione solo se dal lato opposto l'energia immagazzinata è minore.
block.battery.description = Immagazzina l'energia quando in eccesso. Emette l'energia nei momenti di deficit.
block.battery-large.description = Immagazzina l'energia quando in eccesso. Emette l'energia nei momenti di deficit. Ha una capacità maggiore rispetto le batterie tradizionali.
block.combustion-generator.description = Genera energia bruciando combustibili come il carbone.
block.thermal-generator.description = Genera energia se posizionato su luoghi caldi.
block.steam-generator.description = Genera energia bruciando combustibili per trasformare l'acqua in vapore.
block.differential-generator.description = Genera grandi quantità di energia sfruttando la differenza di temperatura tra criofluido e Piratite ardente.
block.rtg-generator.description = Sfrutta lentamente il calore dei composti radioattivi in decadimento per produrre energia.
block.solar-panel.description = Genera piccole quantità di energia dal sole.
block.solar-panel-large.description = Genera piccole quantità di energia dal sole. Più efficente del pannello solare tradizionale.
block.thorium-reactor.description = Genera grandi quantità di energia dal torio. Ha bisogno di essere costantemente raffreddato. Esplode violentemente quando il liquido refrigerante non è sufficente a raffreddarlo.
block.impact-reactor.description = Quando alla massima efficienza, genera enormi quantità di energia. Ha bisogno di una discreta quantità di energia per avviare il processo.
block.mechanical-drill.description = Quando posizionata su un minerale, estrae minerali ad un ritmo lento ma costante. Può scavare solo i minerali più teneri.
block.pneumatic-drill.description = Una trivella migliorata capace di estrarre il titanio. Lavora più velocemente di una trivella meccanica.
block.laser-drill.description = Grazie alla tecnologia laser, permette di scavare ancora più velocemente ma deve essere alimentata. È in grado di estrarre il torio.
block.blast-drill.description = La trivella migliore. Richiede grandi quantità di energia per funzionare.
block.water-extractor.description = Estrae l'acqua dal terreno. Utilizzato nei luoghi senza una fonte d'acqua superficiale nelle vicinanze.
block.cultivator.description = Coltiva delle piccole concentrazioni di spore presenti nell'atmosfera in baccelli di spore.
block.cultivator.details = Tecnologia recuperata. Usata per la produzione di enormi quantità di materiale organico il più efficientemente possibile. È probabile che sia il primo incubatore delle spore che ora ricoprono Serpulo.
block.oil-extractor.description = Utilizza grandi quantità di energia, sabbia ed acqua per estrarre il petrolio.
block.core-shard.description = Nucleo della base. Una volta distrutto, il settore è perso.
block.core-shard.details = La prima generazione. Compatto. Autoreplicante. Dotato di propulsori di lancio monouso. Non pensato per viaggi interplanetari.
block.core-foundation.description = Nucleo della base. Corazzato. Immagazzina più risorse del Frammento.
block.core-foundation.details = La seconda generazione.
block.core-nucleus.description = Nucleo della base. Estremamente resistente. Immagazzina enormi quantità di risorse.
block.core-nucleus.details = La terza e ultima generazione.
block.vault.description = Immagazzina grandi quantità di oggetti di ogni tipo. Può essere svuotato con uno scaricatore.
block.container.description = Imagazzina piccole quantità di oggetti di ogni tipo. Può essere svuotato con uno scaricatore.
block.unloader.description = Scarica l'oggetto selezionato dai blocchi adiacenti.
block.launch-pad.description = Lancia lotti di oggetti ai settori selezionati.
block.advanced-launch-pad.description = Launches batches of items to selected sectors. Only accepts one item type at a time.
block.advanced-launch-pad.details = Sub-orbital system for point-to-point transportation of resources.
block.landing-pad.description = Receives items from launch pads in other sectors. Requires large amounts of water to protect against impacts of landings.
block.duo.description = Spara proiettili ai nemici.
block.scatter.description = Spara agglomerati di piombo, rottami o vetro metallico ai nemici aerei.
block.scorch.description = Incenerisce qualsiasi unità terrena nelle vicinanze. Altamente efficace a distanza ravvicinata.
block.hail.description = Spara piccole schegge alle unità terrene su lunghe distanze.
block.wave.description = Spara liquidi ai nemici. Quando alimentato ad acqua, estingue automaticamente gli incendi.
block.lancer.description = Carica e spara potenti raggi di energia alle unità terrene.
block.arc.description = Spara archi elettrici alle unità terrene.
block.swarmer.description = Spara missili automiranti ai nemici.
block.salvo.description = Spara raffiche di proiettili ai nemici.
block.fuse.description = Colpisce i nemici vicini con tre scariche penetranti.
block.ripple.description = Spara molteplici proiettili alle unità terrene, anche su lunghe distanze.
block.cyclone.description = Spara raffiche di proiettili ai nemici nelle vicinanze.
block.spectre.description = Spara raffiche di proiettili perforanti alle unità aeree e terrene.
block.meltdown.description = Carica e spara un potentissimo raggio laser ai nemici vicini. Richiede liquido refrigerante per funzionare.
block.foreshadow.description = Spara con precisione un potente raggio, anche su grandi distanze.
block.repair-point.description = Ripara costantemente l'unità più vicina nel suo raggio d'azione.
block.segment.description = Indebolisce e distrugge i proiettili nel suo raggio d'azione. I laser non vengono mirati.
block.parallax.description = Spara un raggio traente che avvicina i bersagli aerei, indebolendoli allo stesso tempo.
block.tsunami.description = Spara potenti getti di liquidi ai nemici. Quando alimentato ad acqua, estingue automaticamente gli incendi.
block.silicon-crucible.description = Produce il silicio da sabbia e carbone usando la Piratite come fonte di calore aggiuntiva. Aumenta la sua efficienza su terreni caldi.
block.disassembler.description = Separa le scorie in diversi minerali, tra cui il torio.
block.overdrive-dome.description = Aumenta la velocità delle strutture vicine. Richiede tessuto di fase e silicio per funzionare.
block.payload-conveyor.description = Trasporta carichi pesanti come le unità prodotte nelle fabbriche.
block.payload-router.description = Divide equamente il carico dei trasportatori di massa in 3 direzioni.
block.ground-factory.description = Produce le unità terrene. Le unità prodotte possono essere utilizzate direttamente o trasferite nei ricostruttori per essere potenziate.
block.air-factory.description = Produce le unità aeree. Le unità prodotte possono essere utilizzate direttamente o trasferite nei ricostruttori per essere potenziate.
block.naval-factory.description = Produce le unità navali. Le unità prodotte possono essere utilizzate direttamente o trasferite nei ricostruttori per essere potenziate.
block.additive-reconstructor.description = Migliora le unità in ingresso ad unità di seconda generazione.
block.multiplicative-reconstructor.description = Migliora le unità in ingresso ad unità di terza generazione.
block.exponential-reconstructor.description = Migliora le unità in ingresso ad unità di quarta generazione.
block.tetrative-reconstructor.description = Migliora le unità in ingresso ad unità di quinta generazione.
block.switch.description = Un semplice interruttore. Il suo stato può essere letto e controllato dai processori.
block.micro-processor.description = Esegue costantemente una sequenza di istruzioni. Può essere usato per controllare unità e strutture.
block.logic-processor.description = Esegue costantemente una sequenza di istruzioni. Può essere usato per controllare unità e strutture. Più veloce del micro processore.
block.hyper-processor.description = Esegue costantemente una sequenza di istruzioni. Può essere usato per controllare unità e strutture. Più veloce del processore logico.
block.memory-cell.description = Imagazzina le informazioni elaborate dai processori.
block.memory-bank.description = Imagazzina le informazioni elaborate dai processori. Alta capacità.
block.logic-display.description = Visualizza la grafica arbitraria  elaborata dal processore.
block.large-logic-display.description = Visualizza la grafica arbitraria elaborata dal processore.
block.tile-logic-display.description = Visualizza grafica arbitraria da un processore logico.\n Si collega ai blocchi di visualizzazione affiancati adiacenti.
block.interplanetary-accelerator.description = Una massiccia torre che utilizza potenti campi elettromagnetici. Accelera nuclei fino alla velocità di fuga per un impiego interplanetario.
block.repair-turret.description = Ripara continuamente l'unità danneggiata più vicina. Accetta, facoltativamente, il liquido di raffreddamento.

#Erekir
block.core-bastion.description = Nucleo della base. Corazzato. Una volta distrutto, il settore è perduto.
block.core-citadel.description = Nucleo della base. Molto ben corazzato. Contiene più risorse di un nucleo di Bastione.
block.core-acropolis.description = Nucleo della base. Eccezionalmente ben corazzato. Contiene più risorse di un nucleo Cittadella.
block.breach.description = Spara munizioni perforanti al berillio o al tungsteno contro i bersagli nemici.
block.diffuse.description = Spara una raffica di proiettili in un ampio cono. Respinge i bersagli nemici.
block.sublimate.description = Spara un getto continuo di fiamme contro i bersagli nemici. Perfora le armature.
block.titan.description = Spara un enorme proiettile di artiglieria esplosivo contro bersagli terrestri. Richiede idrogeno.
block.afflict.description = Spara una massiccia sfera carica di schegge antiaeree. Richiede riscaldamento.
block.disperse.description = Spara raffiche di contraerea contro bersagli aerei.
block.lustre.description = Spara un laser a bersaglio singolo a movimento lento contro i bersagli nemici.
block.scathe.description = Lancia un potente missile contro bersagli terrestri su grandi distanze.
block.smite.description = Spara raffiche di proiettili perforanti che emettono fulmini.
block.malign.description = Spara una raffica di colpi laser a ricerca automatica contro i bersagli nemici. Richiede un riscaldamento considerevole.
block.silicon-arc-furnace.description = Raffina il silicio a partire da sabbia e grafite.
block.oxidation-chamber.description = Converte il berillio e l'ozono in ossido. Emette calore come sottoprodotto.
block.electric-heater.description = Riscalda i blocchi di rivestimento. Richiede grandi quantità di energia.
block.slag-heater.description = Riscalda i blocchi di fronte. Richiede scorie.
block.phase-heater.description = Riscalda i blocchi di rivestimento. Richiede tessuto di fase.
block.heat-redirector.description = Reindirizza il calore accumulato verso altri blocchi.
block.small-heat-redirector.description = Reindirizza il calore accumulato verso altri blocchi.
block.heat-router.description = Diffonde il calore accumulato in tre direzioni di uscita.
block.electrolyzer.description = Converte l'acqua in idrogeno e ozono gassoso.
block.atmospheric-concentrator.description = Concentra l'azoto dall'atmosfera. Richiede calore.
block.surge-crucible.description = Produce Lega Superconduttrice da scorie e silicio. Richiede calore.
block.phase-synthesizer.description = Sintetizza Tessuto di Fase a partire da torio, sabbia e ozono. Richiede calore.
block.carbide-crucible.description = Permette di fondere grafite e tungsteno in Carburo. Richiede calore.
block.cyanogen-synthesizer.description = Sintetizza il cianogeno a partire da archicite e grafite. Richiede calore.
block.slag-incinerator.description = Incenerisce materiali o liquidi non volatili. Richiede scorie.
block.vent-condenser.description = Condensa i gas dei sfiati in acqua. Consuma energia.
block.plasma-bore.description = Estrae le risorse se posizionato di fronte a una parete di minerali. Richiede una piccola quantità di energia.
block.large-plasma-bore.description = Una trivella al plasma di dimensioni maggiori. In grado di estrarre tungsteno e torio. Richiede idrogeno ed Elettricità.
block.cliff-crusher.description = Frantuma i muri, rilasciando sabbia. Richiede energia. L'efficienza varia in base al tipo di muro.
block.large-cliff-crusher.description = Frantuma i muri, rilasciando sabbia. Richiede energia e ozono. L'efficienza varia in base al tipo di muro. Può consumare tungsteno, se necessario, per aumentare l'efficienza.
block.impact-drill.description = Estrae risorse se posizionato su un minerale. Richiede energia e acqua.
block.eruption-drill.description = Una trivella ad eruzione Migliorata. Adatta all'estrazione del torio. Richiede idrogeno.
block.reinforced-conduit.description = Trasporta i fluidi in avanti. Non accetta ingressi laterali non tramite condotti.
block.reinforced-liquid-router.description = Distribuisce i fluidi in modo uniforme su tutti i lati.
block.reinforced-liquid-tank.description = Immagazzina una grande quantità di liquidi.
block.reinforced-liquid-container.description = Immagazzina una notevole quantità di liquidi.
block.reinforced-bridge-conduit.description = Trasporta fluidi su strutture e terreni.
block.reinforced-pump.description = Pompa e produce liquidi. Richiede idrogeno.
block.beryllium-wall.description = Protegge le strutture dai proiettili nemici.
block.beryllium-wall-large.description = Protegge le strutture dai proiettili nemici.
block.tungsten-wall.description = Protegge le strutture dai proiettili nemici.
block.tungsten-wall-large.description = Protegge le strutture dai proiettili nemici.
block.carbide-wall.description = Protegge le strutture dai proiettili nemici.
block.carbide-wall-large.description = Protegge le strutture dai proiettili nemici.
block.reinforced-surge-wall.description = Protegge le strutture dai proiettili nemici, generando periodicamente archi elettrici al contatto con i proiettili..
block.reinforced-surge-wall-large.description = Protegge le strutture dai proiettili nemici, lanciando periodicamente archi elettrici al contatto con i proiettili..
block.shielded-wall.description = Protegge le strutture dai proiettili nemici. Attiva uno scudo che assorbe la maggior parte dei proiettili quando viene fornita energia. Conduce energia.
block.blast-door.description = Un muro che si apre quando le unità di terra alleate si trovano nel raggio d'azione. Non può essere controllato manualmente.
block.duct.description = Sposta gli oggetti in avanti. Può contenere un solo oggetto.
block.armored-duct.description = Sposta gli oggetti in avanti. Non accetta ingressi non canalizzati dai lati.
block.duct-router.description = Distribuisce le risorse in modo uniforme su tre direzioni. Accetta articoli solo dal lato posteriore. Può essere configurato come selezionatore di articoli.
block.overflow-duct.description = Gli oggetti vengono deviati lateralmente solo se il percorso frontale è bloccato.
block.duct-bridge.description = Consente di spostare oggetti sopra strutture e terreni.
block.duct-unloader.description = scarica la risorza selezionato dal blocco dietro di esso. Non è possibile rimuovere risorse dai nuclei.
block.underflow-duct.description = L'pposto di un condotto per eccesso. Devia di fronte se le uscite a destra e a sinistra sono ostruite.
block.reinforced-liquid-junction.description = Funge da incrocio tra due condotti incrociati.
block.surge-conveyor.description = Sposta gli oggetti in lotti. Può essere accelerato con energia. Conduce energia.
block.surge-router.description = Distribuisce uniformemente le risorse in tre direzioni dal condotto sovraccaricato. Può essere accelerato tramite Elettricità. Conduce Energia.
block.unit-cargo-loader.description = Costruisce droni da carico. I droni distribuiscono automaticamente gli oggetti ai punti di scarico con un filtro corrispondente.
block.unit-cargo-unload-point.description = Funge da punto di scarico per i droni cargo. Accetta risorse che corrispondono al filtro selezionato.
block.beam-node.description = Trasmette energia ad altri blocchi ortogonalmente. Immagazzina una piccola quantità di energia.
block.beam-tower.description = Trasmette energia ad altri blocchi ortogonalmente in un lungo raggio. Immagazzina una grande quantità di energia.
block.beam-link.description = Trasmette energia su grandi distanze.\n È in grado di connettersi solo a strutture adiacenti o ad altri collegamenti a raggio.
block.turbine-condenser.description = Genera energia quando posizionato sui sfiati. Produce una piccola quantità d'acqua.
block.chemical-combustion-chamber.description = Genera energia dall'archicite e dall'ozono.
block.pyrolysis-generator.description = Genera grandi quantità di energia da arcicite e scorie. Produce acqua come sottoprodotto.
block.flux-reactor.description = Genera grandi quantità di energia quando riscaldato. Richiede cianogeno come stabilizzante. La potenza erogata e il fabbisogno di cianogeno sono proporzionali all'apporto di calore.\n Esplode se la quantità di cianogeno fornita è insufficiente.
block.neoplasia-reactor.description =Utilizza archicite, acqua e tessuto di fase per generare grandi quantità di energia. Produce calore e Neoplasma pericolose come sottoprodotto. Esplode violentemente se il Neoplasma non viene rimosso dal reattore tramite tubi.
block.build-tower.description = Ricostruisce automaticamente le strutture nel raggio d'azione e assiste le altre unità nella costruzione.
block.regen-projector.description = Ripara lentamente le strutture alleate all'interno di un perimetro quadrato. Richiede idrogeno.
block.reinforced-container.description = Immagazzina una piccola quantità di oggetti. Il contenuto può essere recuperato tramite scaricatori. Non aumenta la capacità di archiviazione principale..
block.reinforced-vault.description = Immagazzina un gran numero di oggetti. Il contenuto può essere recuperato tramite scaricatori. Non aumenta la capacità di archiviazione principale.
block.tank-fabricator.description = Costruisce unità Stell. Le unità prodotte possono essere utilizzate direttamente o trasferite nei rifabbricatori per l'aggiornamento.
block.ship-fabricator.description = Costruisce unità Elude. Le unità prodotte possono essere utilizzate direttamente o trasferite nei rifabbricatori per l'aggiornamento.
block.mech-fabricator.description = Costruisce unità Merui. Le unità prodotte possono essere utilizzate direttamente oppure trasferite nei rifabbricatori per l'aggiornamento.
block.tank-assembler.description = Assembla grandi carri utilizzando blocchi e unità inseriti. Il rango di produzione può essere aumentato aggiungendo moduli.
block.ship-assembler.description = Assembla grandi navi utilizzando blocchi e unità inseriti. Il rango di produzione può essere aumentato aggiungendo moduli.
block.mech-assembler.description = Assembla grandi mech a partire da blocchi e unità inseriti. Il rango di produzione può essere aumentato aggiungendo moduli.
block.tank-refabricator.description = Aggiorna le unità carri inserite al secondo rango.
block.ship-refabricator.description = Aggiorna le unità navali inserite al secondo rango.
block.mech-refabricator.description = Aggiorna le unità mech inserite al secondo rango.
block.prime-refabricator.description = Aggiorna le unità inserite al terzo rango.
block.basic-assembler-module.description = Incrementa gli assemblatori alla generazione successiva quando è piazzato di fianco ad un perimetro di costruzione. Richiede energia. Può essere usato come ingresso di materiale.
block.small-deconstructor.description = Scompone le strutture e le unità inserite. Restituisce il 100% del costo di costruzione.
block.reinforced-payload-conveyor.description = Sposta i carichi in avanti.
block.reinforced-payload-router.description = Distribuisce carichi in blocchi adiacenti. Funziona come un filtro quando è impostato un filtro.
block.payload-mass-driver.description = Struttura per il trasporto di carichi a lungo raggio. Spara i carichi ricevuti ai Lancia Materiali collegati.
block.large-payload-mass-driver.description = Struttura per il trasporto di carichi a lungo raggio. Spara i carichi ricevuti ai Lancia Materiali collegati.
block.unit-repair-tower.description = Ripara tutte le unità nelle sue vicinanze. Richiede ozono.
block.radar.description = Svela gradualmente il terreno e le unità nemiche in un ampio raggio. Richiede energia.
block.shockwave-tower.description = Danneggia e distrugge i proiettili nemici in un raggio d'azione. Richiede cianogeno.
block.canvas.description = Visualizza un'immagine semplice con una tavolozza predefinita. Modificabile.
block.large-canvas.description = Visualizza un'immagine semplice con una tavolozza predefinita. Modificabile.

unit.dagger.description = Spara proiettili standard ai nemici vicini.
unit.mace.description = Spara raffiche infuocate ai nemici vicini.
unit.fortress.description = Spara proiettili con l'artiglieria a lungo raggio alle unità terrene.
unit.scepter.description = Spara una raffica di proiettili Fires a barrage of charged bullets at all nearby enemies.
unit.reign.description = Spara una serie di proiettili perforanti a tutti i nemici nelle vicinanze.
unit.nova.description = Spara raggi laser che danneggiano i nemici e riparano le strutture degli alleati. È in grado di volare.
unit.pulsar.description = Spara archi elettrici che danneggiano i nemici e riparano le strutture degli alleati. È in grado di volare.
unit.quasar.description = Spara raggi laser perforanti che danneggiano i nemici e riparano le strutture degli alleati. È in grado di volare. Corazzato.
unit.vela.description = Spara un enorme e costante raggio laser che danneggia i nemici e ripara le strutture degli alleati. È in grado di volare.
unit.corvus.description = Spara un enorme raggio laser esplosivo che danneggia i nemici e ripara le strutture degli alleati. Può camminare sopra la maggior parte dei terreni.
unit.crawler.description = Corre verso i nemici ed esplode, causando una grande esplosione. Può camminare sopra la maggior parte dei terreni.
unit.atrax.description = Spara sfere debilitanti di scorie alle unità terrene. Può camminare sopra la maggior parte dei terreni.
unit.spiroct.description = Spara raggi laser ai nemici, riparando se stesso. Può camminare sopra la maggior parte dei terreni.
unit.arkyid.description = Spara enormi raggi laser ai nemici, riparando se stesso. Può camminare sopra la maggior parte dei terreni.
unit.toxopid.description = Spara archi elettrici e laser perforanti ai nemici. Può camminare sopra la maggior parte dei terreni.
unit.flare.description = Spara proiettili standard alle unità terrene e alle strutture nemiche.
unit.horizon.description = Rilascia bombe alle unità terrene e alle strutture nemiche.
unit.zenith.description = Spara salve di missili ai nemici vicini.
unit.antumbra.description = Spara una serie continua di proiettili ai nemici nelle vicinanze.
unit.eclipse.description = Spara due laser perforanti e schegge ai nemici nelle vicinanze.
unit.mono.description = Estrae rame e piombo automaticamente per poi depositarlo nel nucleo.
unit.poly.description = Ricostruisce automaticamente le strutture danneggiate e assiste altre unità durante la costruzione.
unit.mega.description = Ripara automaticamente le strutture danneggiate. È in grado di trasportare blocchi e piccole unità terrene.
unit.quad.description = Rilascia grandi bombe alle unità terrene, riparando le strutture alleate e danneggiando quelle nemiche. È in grado di trasportare unità terrene di medie dimensioni.
unit.oct.description = Protegge gli alleati nelle vicinanze con lo scudo rigenerante integrato. È in grado di trasportare la maggior parte delle unità terrene.
unit.risso.description = Spara una raffica di missili e proiettili ai nemici nelle vicinanze.
unit.minke.description = Spara proiettili incendiari e standard alle unità terrene.
unit.bryde.description = Spara proiettili e missili a lungo raggio ai nemici.
unit.sei.description = Spara raffiche di missili e proiettili corazzati e perforanti ai nemici.
unit.omura.description = Utilizza un bullone sparatato grazie a due binari a scorrimento accelerati da un campo elettromagnetico. Lunga gittata e perforazione estrema.
unit.alpha.description = Difende il nucleo Frammento dai nemici. Costruisce strutture.
unit.beta.description = Difende il nucleo Fondamento dai nemici. Costruisce strutture.
unit.gamma.description = Difende il nucleo Kernel dai nemici. Costruisce strutture.
unit.retusa.description = Lancia siluri di puntamento contro i nemici vicini. Ripara le unità alleate.
unit.oxynoe.description = Spara flussi di fiamme che riparano le strutture ai nemici vicini. Bersaglia i proiettili nemici nelle vicinanze con una torretta di difesa.
unit.cyerce.description = Spara missili a grappolo contro i nemici. Ripara le unità alleate.
unit.aegires.description = Scuote tutte le unità e le strutture nemiche che entrano nel suo campo energetico. Ripara tutti gli alleati.
unit.navanax.description = Spara proiettili EMP esplosivi, infliggendo danni significativi alle reti elettriche nemiche e riparando le strutture alleate. Scioglie i nemici vicini con 4 torrette laser autonome.

#Erekir
unit.stell.description = Spara proiettili standard contro i bersagli nemici.
unit.locus.description = Spara proiettili alternati contro i bersagli nemici.
unit.precept.description = Spara proiettili a grappolo perforanti contro i bersagli nemici.
unit.vanquish.description = Spara grandi proiettili perforanti contro i bersagli nemici.
unit.conquer.description = Spara grandi cascate di proiettili perforanti contro i bersagli nemici.
unit.merui.description = Spara con l'artiglieria a lungo raggio contro bersagli terrestri nemici. Può superare la maggior parte dei terreni.
unit.cleroi.description = Spara proiettili doppi contro i bersagli nemici. Bersaglia i proiettili nemici con le torrette di difesa. Può superare la maggior parte dei terreni.
unit.anthicus.description = Spara missili a lunga gittata contro i bersagli nemici. Può superare la maggior parte dei terreni.
unit.tecta.description = Spara missili al plasma a puntamento interno contro i bersagli nemici. Si protegge con uno scudo direzionale. Può superare la maggior parte dei terreni.
unit.collaris.description = Spara con l'artiglieria a frammentazione a lungo raggio contro gli obiettivi nemici. Può superare la maggior parte dei terreni.
unit.elude.description = Spara coppie di proiettili di puntamento contro i bersagli nemici. Può galleggiare su corpi liquidi.
unit.avert.description = Spara coppie di proiettili a spirale contro i bersagli nemici.
unit.obviate.description = Spara coppie di fulmini a spirale contro i bersagli nemici.
unit.quell.description = Spara missili di puntamento a lungo raggio contro gli obiettivi nemici. Sopprime i blocchi di riparazione delle strutture nemiche.
unit.disrupt.description = Spara missili di soppressione a lungo raggio contro gli obiettivi nemici. Sopprime i blocchi di riparazione delle strutture nemiche.
unit.evoke.description = Costruisce strutture per difendere il nucleo Bastione. Ripara le strutture con un raggio.
unit.incite.description = Costruisce strutture per difendere il nucleo Cittadella. Ripara le strutture con un raggio.
unit.emanate.description = Costruisce strutture per difendere il nucleo Acropoli. Ripara le strutture con le travi.

lst.read = Leggi un numero da una cella di memoria collegata.
lst.write = Scrivi un numero in una cella di memoria collegata.
lst.print = Add text to the print buffer.\nDoes not display anything until [accent]Print Flush[] is used.
lst.printchar = Add a UTF-16 character or content icon to the print buffer.\nDoes not display anything until [accent]Print Flush[] is used.
lst.format = Replace next placeholder in text buffer with a value.\nDoes not do anything if placeholder pattern is invalid.\nPlaceholder pattern: "{[accent]number 0-9[]}"\nExample:\n[accent]print "test {0}"\nformat "example"
lst.draw = Add an operation to the drawing buffer.\nDoes not display anything until [accent]Draw Flush[] is used.
lst.drawflush = Flush queued [accent]Draw[] operations to a display.
lst.printflush = Flush queued [accent]Print[] operations to a message block.
lst.getlink = Get a processor link by index. Starts at 0.
lst.control = Controlla un edificio.
lst.radar = Geolocalizza unità attorno ad un edificio, dato un certo raggio.
lst.sensor = Ottieni informazioni da un edificio o da unità.
lst.set = Imposta una variabile.
lst.operation = Esegui un'operazione su 1-2 variabili.
lst.select = Conditionally set a variable to one of two values.
lst.end = Jump to the top of the instruction stack.
lst.wait = Attendi un certo numero di secondi.
lst.stop = Interrompi l'esecuzione di questo processore.
lst.lookup = Look up an item/liquid/unit/block type by ID.\nTotal counts of each type can be accessed with:\n[accent]@unitCount[] / [accent]@itemCount[] / [accent]@liquidCount[] / [accent]@blockCount[]
lst.jump = Conditionally jump to another statement.
lst.unitbind = Bind to the next unit of a type, and store it in [accent]@unit[].
lst.unitcontrol = Control the currently bound unit.
lst.unitradar = Locate units around the currently bound unit.
lst.unitlocate = Locate a specific type of position/building anywhere on the map.\nRequires a bound unit.
lst.getblock = Get tile data at any location.
lst.setblock = Set tile data at any location.
lst.spawnunit = Spawn unit at a location.
lst.spawnbullet = Spawns a bullet at a location.
lst.applystatus = Apply or clear a status effect from a uniut.
lst.weathersense = Check if a type of weather is active.
lst.weatherset = Set the current state of a type of weather.
lst.spawnwave = Simulate a wave being spawned at a arbitrary location.\nWill not increment the wave counter.
lst.explosion = Create an explosion at a location.
lst.setrate = Set processor execution speed in instructions/tick.
lst.fetch = Lookup units, cores, players or buildings by index.\nIndices start at 0 and end at their returned count.
lst.packcolor = Pack [0, 1] RGBA components into a single number for drawing or rule-setting.
lst.unpackcolor = Unpack RGBA components from a color that was packed using Pack Color.
lst.setrule = Set a game rule.
lst.flushmessage = Display a message on the screen from the text buffer.\nWill wait until the previous message finishes.
lst.cutscene = Manipulate the player camera.
lst.setflag = Set a global flag that can be read by all processors.
lst.getflag = Check if a global flag is set.
lst.setprop = Sets a property of a unit or building.
lst.effect = Create a particle effect.
lst.sync = Sync a variable across the network.\nOnly invoked 10 times a second at most.
lst.playsound = Plays a sound.\nVolume and pan can be a global value, or calculated based on position.
lst.playmusic = Plays a music track by name, e.g. [accent]"game1"[].\nIf [accent]interrupt[] is true, the previously playing music will be stopped.\nPlaying with null music and interrupt set to true will stop the current track.\nNote that music from data patches must be prefixed with [accent]dp-[].
lst.makemarker = Create a new logic marker in the world.\nAn ID to identify this marker must be provided.\nMarkers currently limited to 20,000 per world.
lst.setmarker = Set a property for a marker.\nThe ID used must be the same as in the Make Marker instruction.
lst.localeprint = Add map locale property value to the text buffer.\nTo set map locale bundles in map editor, check [accent]Map Info > Locale Bundles[].\nIf client is a mobile device, tries to print a property ending in ".mobile" first.
lst.query = Queries units/buildings in a specified area.\nResults are outputted into [accent]@queries[].\nResults can be read from [accent]@queries[] using the [accent]Read[] instruction and an index.\nLength of [accent]@queries[] can be sensed using [accent]@size[] as a parameter.

